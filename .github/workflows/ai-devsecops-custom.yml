name: "AI DevSecOps \u2014 Domain Compliance (blog)"
'on':
  workflow_call:
    inputs:
      detected_domain:
        description: Domain classification from the AI agent.
        required: false
        type: string
        default: blog
permissions:
  contents: read
  security-events: write
jobs:
  cms-markdown-xss-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
    - name: Checkout code
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
      with:
        persist-credentials: false
    - name: Detect unsanitised markdown render of user input
      run: 'echo ''AI-designed Semgrep rule (id=ai-rule):''

        echo ''Rule body:''

        cat <<''SEMGREP_EOF'' | sed ''s/^/  /''


        SEMGREP_EOF

        '
    - name: Grep for unsafe markdown-to-view pipelines
      run: "# Set up output capture for the annotation-to-SARIF step.\nexec > >(tee\
        \ -a sast.shell_log) 2>&1\n# Run the original script in a subshell with set\
        \ +e so\n# that any single command failure does not abort the\n# script before\
        \ it can emit a '::error' annotation.\ninner_exit=0\n( set +e\ncd \"$GITHUB_WORKSPACE\"\
        \n\n# 1. Find every place marked / showdown render something\nMARKED_HITS=$(grep\
        \ -RInE 'marked(\\s*\\()?\\s*\\(|marked\\.parse\\s*\\(|new\\s+showdown\\.Converter'\
        \ src/ 2>/dev/null || true)\n\n# 2. Confirm there is NO sanitiser in the same\
        \ files\nUNSANITISED=$(echo \"$MARKED_HITS\" | while read -r line; do\n  file=\"\
        $(echo \"$line\" | cut -d: -f1)\"\n  [ -z \"$file\" ] && continue\n  if !\
        \ grep -qE 'DOMPurify|sanitize-html|xss|bleach' \"$file\"; then\n    echo\
        \ \"$line\"\n  fi\ndone || true)\n\n# 3. Find EJS templates using unescaped\
        \ output of likely-content vars\nEJS_BAD=$(grep -RInE '<%-\\s*[^%]*\\b(post|comment|content|body|markdown|renderedHtml)\\\
        b' views/ 2>/dev/null || true)\n\nif [ -n \"$UNSANITISED\" ] || [ -n \"$EJS_BAD\"\
        \ ]; then\n  echo \"::error title=Markdown XSS risk::\"\n  echo \"Unsaniitised\
        \ markdown render calls:\"\n  echo \"$UNSANITISED\"\n  echo \"EJS unescaped\
        \ content variables:\"\n  echo \"$EJS_BAD\"\n  exit 1\nfi\necho \"No unsafe\
        \ markdown pipelines detected.\"\n) || inner_exit=$?\n# If the inner script\
        \ exited non-zero and emitted no\n# '::error'/'::warning' annotation, synthesise\
        \ one so the\n# SARIF conversion step still has a finding to record.\nif [\
        \ \"$inner_exit\" -ne 0 ] && ! grep -qE '^::(error|warning)' sast.shell_log;\
        \ then\n  echo \"::error file=Grep for unsafe markdown-to-view pipelines::shell\
        \ check failed (exit code $inner_exit) \u2014 see run log for details\"\n\
        fi\nexit $inner_exit\n"
    - name: Convert sast shell_check annotations to SARIF
      if: always()
      run: "cat > sast_annotations_to_sarif.py <<'PY_EOF'\nimport os, re, json\nlog_path\
        \ = 'sast.shell_log'\nsarif_path = 'sast-results.sarif'\ntool_name = 'sast'\n\
        tool_version = '1.0.0'\ninformation_uri = 'https://github.com/iqbalrsyd/ai-devsecops'\n\
        rule_id_prefix = 'ai-devsecops-sast'\nresults = []\nif os.path.exists(log_path):\n\
        \    pat = re.compile(r'^::(error|warning)(?: file=([^,]+))?(?:,line=(\\d+))?(?:,endLine=(\\\
        d+))?::(.*)$')\n    for idx, line in enumerate(open(log_path, encoding='utf-8',\
        \ errors='replace')):\n        m = pat.match(line.rstrip('\\n'))\n       \
        \ if not m:\n            continue\n        level, path, sl, el, msg = m.groups()\n\
        \        sl = int(sl) if sl else 1\n        el = int(el) if el else sl\n \
        \       if level == 'error':\n            sarif_level = 'error'\n        else:\n\
        \            sarif_level = 'warning'\n        msg = msg.strip()\n        slug\
        \ = re.sub(r'[^a-z0-9]+', '-', (msg or 'finding').lower())[:50].strip('-')\n\
        \        rule_id = f'{rule_id_prefix}-{slug}-{sl}-{idx}'\n        results.append({\n\
        \            'ruleId': rule_id,\n            'level': sarif_level,\n     \
        \       'message': {'text': msg or '(no message)'},\n            'locations':\
        \ [{\n                'physicalLocation': {\n                    'artifactLocation':\
        \ {'uri': path or 'unknown'},\n                    'region': {'startLine':\
        \ sl, 'endLine': el},\n                },\n            }],\n        })\nexisting\
        \ = {}\nif os.path.exists(sarif_path) and os.path.getsize(sarif_path) > 0:\n\
        \    try:\n        existing = json.load(open(sarif_path, encoding='utf-8'))\n\
        \    except Exception:\n        existing = {}\nif not existing or 'runs' not\
        \ in existing or not existing['runs']:\n    existing = {\n        'version':\
        \ '2.1.0',\n        '$schema': 'https://json.schemastore.org/sarif-2.1.0.json',\n\
        \        'runs': [{\n            'tool': {'driver': {\n                'name':\
        \ tool_name, 'version': tool_version, 'informationUri': information_uri,\n\
        \            }},\n            'results': [],\n        }],\n    }\nexisting['runs'][0]['tool']['driver']['name']\
        \ = tool_name\nexisting['runs'][0]['tool']['driver']['version'] = tool_version\n\
        existing['runs'][0]['tool']['driver']['informationUri'] = information_uri\n\
        existing['runs'][0]['results'] = (existing['runs'][0].get('results') or [])\
        \ + results\nwith open(sarif_path, 'w', encoding='utf-8') as f:\n    json.dump(existing,\
        \ f, indent=2)\nprint(f'Wrote {len(results)} SARIF result(s) to {sarif_path}')\n\
        PY_EOF\npython3 sast_annotations_to_sarif.py\n"
    - name: Ensure sast-results.sarif exists (fallback for 0 findings)
      if: always()
      run: "if [ ! -s sast-results.sarif ]; then\n  echo \"::notice::sast found 0\
        \ findings. Generating empty SARIF to satisfy upload-sarif.\"\n  printf '%s\\\
        n' \\\n    '{' \\\n    '  \"version\": \"2.1.0\",' \\\n    '  \"$schema\"\
        : \"https://json.schemastore.org/sarif-2.1.0.json\",' \\\n    '  \"runs\"\
        : [' \\\n    '    {' \\\n    '      \"tool\": {' \\\n    '        \"driver\"\
        : {' \\\n    '          \"name\": \"sast\",' \\\n    '          \"version\"\
        : \"0.65.0\",' \\\n    '          \"informationUri\": \"https://aquasecurity.github.io/trivy/\"\
        ' \\\n    '        }' \\\n    '      },' \\\n    '      \"results\": []' \\\
        \n    '    }' \\\n    '  ]' \\\n    '}' > sast-results.sarif\nfi\necho \"\u2713\
        \ sast-results.sarif size: $(stat -c%s sast-results.sarif) bytes\"\n"
    - name: Upload sast SARIF to GitHub Code Scanning
      if: always()
      uses: github/codeql-action/upload-sarif@b1722c1245f90604c2c348f9d1624af97ea8fc6e
      with:
        sarif_file: sast-results.sarif
        category: sast
  multer-upload-validation-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
    - name: Checkout code
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
      with:
        persist-credentials: false
    - name: Detect multer configured without fileFilter / limits
      run: 'echo ''AI-designed Semgrep rule (id=ai-rule):''

        echo ''Rule body:''

        cat <<''SEMGREP_EOF'' | sed ''s/^/  /''


        SEMGREP_EOF

        '
    - name: Find multer configs missing fileFilter and limits
      run: "# Set up output capture for the annotation-to-SARIF step.\nexec > >(tee\
        \ -a sast.shell_log) 2>&1\n# Run the original script in a subshell with set\
        \ +e so\n# that any single command failure does not abort the\n# script before\
        \ it can emit a '::error' annotation.\ninner_exit=0\n( set +e\ncd \"$GITHUB_WORKSPACE\"\
        \n\n# Locate every multer instantiation\nmapfile -t MULTER_FILES < <(grep\
        \ -RIlE 'multer\\s*\\(\\s*\\{|multer\\.diskStorage|multer\\.memoryStorage'\
        \ src/ 2>/dev/null || true)\n\nFAIL=0\nfor f in \"${MULTER_FILES[@]}\"; do\n\
        \  [ -z \"$f\" ] && continue\n  echo \"::group::$f\"\n  if ! grep -qE 'fileFilter'\
        \ \"$f\"; then\n    echo \"::error file=$f::multer() used without fileFilter\
        \ \u2014 arbitrary file types accepted (CWE-434)\"\n    FAIL=1\n  fi\n  if\
        \ ! grep -qE 'limits\\s*:\\s*\\{' \"$f\"; then\n    echo \"::error file=$f::multer()\
        \ used without limits.fileSize \u2014 DoS via huge uploads (CWE-770)\"\n \
        \   FAIL=1\n  fi\n  if grep -qE 'destination\\s*:\\s*function\\s*\\(\\s*req'\
        \ \"$f\"; then\n    if grep -E 'destination\\s*:\\s*function\\s*\\(\\s*req'\
        \ \"$f\" | grep -qE 'req\\.(body|query|params)'; then\n      echo \"::error\
        \ file=$f::multer destination derived from req.body/params/query (CWE-22)\"\
        \n      FAIL=1\n    fi\n  fi\n  echo \"::endgroup::\"\ndone\n\nif [ \"$FAIL\"\
        \ -ne 0 ]; then\n  echo \"Multer upload-validation checks FAILED\"\n  exit\
        \ 1\nfi\necho \"All multer configs include fileFilter and limits.\"\n) ||\
        \ inner_exit=$?\n# If the inner script exited non-zero and emitted no\n# '::error'/'::warning'\
        \ annotation, synthesise one so the\n# SARIF conversion step still has a finding\
        \ to record.\nif [ \"$inner_exit\" -ne 0 ] && ! grep -qE '^::(error|warning)'\
        \ sast.shell_log; then\n  echo \"::error file=Find multer configs missing\
        \ fileFilter and limits::shell check failed (exit code $inner_exit) \u2014\
        \ see run log for details\"\nfi\nexit $inner_exit\n"
    - name: Convert sast shell_check annotations to SARIF
      if: always()
      run: "cat > sast_annotations_to_sarif.py <<'PY_EOF'\nimport os, re, json\nlog_path\
        \ = 'sast.shell_log'\nsarif_path = 'sast-results.sarif'\ntool_name = 'sast'\n\
        tool_version = '1.0.0'\ninformation_uri = 'https://github.com/iqbalrsyd/ai-devsecops'\n\
        rule_id_prefix = 'ai-devsecops-sast'\nresults = []\nif os.path.exists(log_path):\n\
        \    pat = re.compile(r'^::(error|warning)(?: file=([^,]+))?(?:,line=(\\d+))?(?:,endLine=(\\\
        d+))?::(.*)$')\n    for idx, line in enumerate(open(log_path, encoding='utf-8',\
        \ errors='replace')):\n        m = pat.match(line.rstrip('\\n'))\n       \
        \ if not m:\n            continue\n        level, path, sl, el, msg = m.groups()\n\
        \        sl = int(sl) if sl else 1\n        el = int(el) if el else sl\n \
        \       if level == 'error':\n            sarif_level = 'error'\n        else:\n\
        \            sarif_level = 'warning'\n        msg = msg.strip()\n        slug\
        \ = re.sub(r'[^a-z0-9]+', '-', (msg or 'finding').lower())[:50].strip('-')\n\
        \        rule_id = f'{rule_id_prefix}-{slug}-{sl}-{idx}'\n        results.append({\n\
        \            'ruleId': rule_id,\n            'level': sarif_level,\n     \
        \       'message': {'text': msg or '(no message)'},\n            'locations':\
        \ [{\n                'physicalLocation': {\n                    'artifactLocation':\
        \ {'uri': path or 'unknown'},\n                    'region': {'startLine':\
        \ sl, 'endLine': el},\n                },\n            }],\n        })\nexisting\
        \ = {}\nif os.path.exists(sarif_path) and os.path.getsize(sarif_path) > 0:\n\
        \    try:\n        existing = json.load(open(sarif_path, encoding='utf-8'))\n\
        \    except Exception:\n        existing = {}\nif not existing or 'runs' not\
        \ in existing or not existing['runs']:\n    existing = {\n        'version':\
        \ '2.1.0',\n        '$schema': 'https://json.schemastore.org/sarif-2.1.0.json',\n\
        \        'runs': [{\n            'tool': {'driver': {\n                'name':\
        \ tool_name, 'version': tool_version, 'informationUri': information_uri,\n\
        \            }},\n            'results': [],\n        }],\n    }\nexisting['runs'][0]['tool']['driver']['name']\
        \ = tool_name\nexisting['runs'][0]['tool']['driver']['version'] = tool_version\n\
        existing['runs'][0]['tool']['driver']['informationUri'] = information_uri\n\
        existing['runs'][0]['results'] = (existing['runs'][0].get('results') or [])\
        \ + results\nwith open(sarif_path, 'w', encoding='utf-8') as f:\n    json.dump(existing,\
        \ f, indent=2)\nprint(f'Wrote {len(results)} SARIF result(s) to {sarif_path}')\n\
        PY_EOF\npython3 sast_annotations_to_sarif.py\n"
    - name: Ensure sast-results.sarif exists (fallback for 0 findings)
      if: always()
      run: "if [ ! -s sast-results.sarif ]; then\n  echo \"::notice::sast found 0\
        \ findings. Generating empty SARIF to satisfy upload-sarif.\"\n  printf '%s\\\
        n' \\\n    '{' \\\n    '  \"version\": \"2.1.0\",' \\\n    '  \"$schema\"\
        : \"https://json.schemastore.org/sarif-2.1.0.json\",' \\\n    '  \"runs\"\
        : [' \\\n    '    {' \\\n    '      \"tool\": {' \\\n    '        \"driver\"\
        : {' \\\n    '          \"name\": \"sast\",' \\\n    '          \"version\"\
        : \"0.65.0\",' \\\n    '          \"informationUri\": \"https://aquasecurity.github.io/trivy/\"\
        ' \\\n    '        }' \\\n    '      },' \\\n    '      \"results\": []' \\\
        \n    '    }' \\\n    '  ]' \\\n    '}' > sast-results.sarif\nfi\necho \"\u2713\
        \ sast-results.sarif size: $(stat -c%s sast-results.sarif) bytes\"\n"
