    - name: Upload sast SARIF to GitHub Code Scanning
      if: always()
      uses: github/codeql-action/upload-sarif@b1722c1245f90604c2c348f9d1624af97ea8fc6e
      with:
        sarif_file: sast-results.sarif
        category: sast
  blog-markdown-sanitize:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
    - name: Checkout code
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
      with:
        persist-credentials: false
    - name: scan-markdown-no-sanitize
      run: "# Set up output capture for the annotation-to-SARIF step.\nexec > >(tee\
        \ -a blog-markdown-xss.shell_log) 2>&1\n# Run the original script in a subshell\
        \ with set +e so\n# that any single command failure does not abort the\n#\
        \ script before it can emit a '::error' annotation.\ninner_exit=0\n( set +e\n\
        fail=0\n# Find marked() or markdown-it usage\nif grep -rnE 'marked\\s*\\('\
        \ src/ 2>/dev/null | grep -vE 'DOMPurify|sanitize' | grep -q .; then\n  echo\
        \ '::error file=src/utils/markdown.js::marked() called without DOMPurify.sanitize\
        \ \u2014 XSS via markdown'\n  fail=1\nfi\n# Find innerHTML with user content\n\
