name: "AI DevSecOps \u2014 Domain Compliance (blog)"
'on':
  workflow_call:
    inputs:
      detected_domain:
        description: Domain classification from the AI agent.
        required: false
        type: string
        default: blog
permissions:
  contents: read
  security-events: write
jobs:
  multer-upload-hardening:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    continue-on-error: true
    steps:
    - name: Checkout code
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
      with:
        persist-credentials: false
    - name: detect-unsafe-multer-config
      run: 'echo ''AI-designed Semgrep rule (id=ai-rule):''

        echo ''Rule body:''

        cat <<''SEMGREP_EOF'' | sed ''s/^/  /''


        SEMGREP_EOF

        '
    - name: verify-multer-limits-and-extensions
      run: "set -e\nFOUND=0\n# 1. Find any multer() / diskStorage() call sites\nmapfile\
        \ -t SITES < <(grep -rEn 'multer\\s*\\(' src/ 2>/dev/null | cut -d: -f1 |\
        \ sort -u)\nfor f in \"${SITES[@]}\"; do\n  echo \"::group::$f\"\n  # 1a.\
        \ fileFilter presence\n  if ! grep -Eq 'fileFilter\\s*[:=]' \"$f\"; then\n\
        \    echo \"::error file=$f::multer() configured without fileFilter\"\n  \
        \  FOUND=1\n  fi\n  # 1b. limits.fileSize presence\n  if ! grep -Eq 'limits\\\
        s*:\\s*\\{[^}]*fileSize' \"$f\"; then\n    echo \"::error file=$f::multer()\
        \ configured without limits.fileSize\"\n    FOUND=1\n  fi\n  # 1c. dangerous\
        \ extensions being accepted explicitly (e.g. .html/.js in allowlist)\n  if\
        \ grep -Eqi \"\\.(js|html|svg|htm)\\b\" \"$f\"; then\n    echo \"::warning\
        \ file=$f::potentially dangerous extension accepted in multer filter\"\n \
        \ fi\n  echo \"::endgroup::\"\ndone\nexit $FOUND\n"
    - name: Ensure file-upload-security-results.sarif exists (fallback for 0 findings)
      if: always()
      run: "if [ ! -s file-upload-security-results.sarif ]; then\n  echo \"::notice::file-upload-security\
        \ found 0 findings. Generating empty SARIF to satisfy upload-sarif.\"\n  printf\
        \ '%s\\n' \\\n    '{' \\\n    '  \"version\": \"2.1.0\",' \\\n    '  \"$schema\"\
        : \"https://json.schemastore.org/sarif-2.1.0.json\",' \\\n    '  \"runs\"\
        : [' \\\n    '    {' \\\n    '      \"tool\": {' \\\n    '        \"driver\"\
        : {' \\\n    '          \"name\": \"file-upload-security\",' \\\n    '   \
        \       \"version\": \"0.65.0\",' \\\n    '          \"informationUri\": \"\
        https://aquasecurity.github.io/trivy/\"' \\\n    '        }' \\\n    '   \
        \   },' \\\n    '      \"results\": []' \\\n    '    }' \\\n    '  ]' \\\n\
        \    '}' > file-upload-security-results.sarif\nfi\necho \"\u2713 file-upload-security-results.sarif\
        \ size: $(stat -c%s file-upload-security-results.sarif) bytes\"\n"
    - name: Upload file-upload-security SARIF to GitHub Code Scanning
      if: always()
      uses: github/codeql-action/upload-sarif@b1722c1245f90604c2c348f9d1624af97ea8fc6e
      with:
        sarif_file: file-upload-security-results.sarif
        category: file-upload-security
  markdown-xss-cms:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    continue-on-error: true
    steps:
    - name: Checkout code
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
      with:
        persist-credentials: false
    - name: detect-unsafe-marked-showdown-options
      run: 'echo ''AI-designed Semgrep rule (id=ai-rule):''

        echo ''Rule body:''

        cat <<''SEMGREP_EOF'' | sed ''s/^/  /''


        SEMGREP_EOF

        '
    - name: scan-render-sites-for-innerhtml-and-missing-sanitize
      run: "set -e\nFOUND=0\n# 1. Look for any .innerHTML = ... assignments, a strong\
        \ XSS smell in EJS-rendered pages\ngrep -rEn '\\.innerHTML\\s*=' src/ views/\
        \ 2>/dev/null | while read -r line; do\n  echo \"::warning ::innerHTML assignment\
        \ detected: $line\"\ndone\n# 2. Look for render sites that pipe markdown output\
        \ straight into EJS without DOMPurify/sanitize-html\nfor f in $(find src -name\
        \ '*.js'); do\n  if grep -Eq 'marked\\(|showdown\\.Converter|converter\\.makeHtml'\
        \ \"$f\"; then\n    if ! grep -Eq 'DOMPurify|sanitize-html|xss|sanitize\\\
        s*\\(' \"$f\"; then\n      echo \"::error file=$f::markdown output is rendered\
        \ without a sanitizer (DOMPurify/sanitize-html)\"\n      FOUND=1\n    fi\n\
        \  fi\ndone\n# 3. Check EJS templates that output raw user comment/post content\
        \ with <%- ... %>\nif grep -rEn '<%-\\s*\\w+\\.(content|body|html|markdown|comment|text)\\\
        b' views/ 2>/dev/null; then\n  echo \"::error ::EJS unescaped output (<%-\
        \ %>) used for user-supplied content\"\n  FOUND=1\nfi\nexit $FOUND\n"
    - name: Ensure cms-xss-results.sarif exists (fallback for 0 findings)
      if: always()
      run: "if [ ! -s cms-xss-results.sarif ]; then\n  echo \"::notice::cms-xss found\
        \ 0 findings. Generating empty SARIF to satisfy upload-sarif.\"\n  printf\
        \ '%s\\n' \\\n    '{' \\\n    '  \"version\": \"2.1.0\",' \\\n    '  \"$schema\"\
        : \"https://json.schemastore.org/sarif-2.1.0.json\",' \\\n    '  \"runs\"\
        : [' \\\n    '    {' \\\n    '      \"tool\": {' \\\n    '        \"driver\"\
        : {' \\\n    '          \"name\": \"cms-xss\",' \\\n    '          \"version\"\
        : \"0.65.0\",' \\\n    '          \"informationUri\": \"https://aquasecurity.github.io/trivy/\"\
        ' \\\n    '        }' \\\n    '      },' \\\n    '      \"results\": []' \\\
        \n    '    }' \\\n    '  ]' \\\n    '}' > cms-xss-results.sarif\nfi\necho\
        \ \"\u2713 cms-xss-results.sarif size: $(stat -c%s cms-xss-results.sarif)\
        \ bytes\"\n"
    - name: Upload cms-xss SARIF to GitHub Code Scanning
      if: always()
      uses: github/codeql-action/upload-sarif@b1722c1245f90604c2c348f9d1624af97ea8fc6e
      with:
        sarif_file: cms-xss-results.sarif
        category: cms-xss
  jwt-auth-hardening:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    continue-on-error: true
    steps:
    - name: Checkout code
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
      with:
        persist-credentials: false
    - name: detect-jwt-misconfig
      run: 'echo ''AI-designed Semgrep rule (id=ai-rule):''

        echo ''Rule body:''

        cat <<''SEMGREP_EOF'' | sed ''s/^/  /''


        SEMGREP_EOF

        '
    - name: verify-jwt-secret-strength-and-cookie-flags
      run: "set -e\nFOUND=0\n# 1. Reject trivial / hard-coded JWT secrets\nif grep\
        \ -rEn \"(secret|key)\\s*[:=]\\s*['\\\"](secret|password|changeme|123456|jwt-secret|test)['\\\
        \"]\" src/ 2>/dev/null; then\n  echo \"::error ::Weak / hard-coded JWT secret\
        \ detected\"\n  FOUND=1\nfi\n# 2. Require an algorithms whitelist in every\
        \ jwt.verify call\nfor f in $(grep -rl 'jwt\\.verify' src/ 2>/dev/null); do\n\
        \  if ! grep -Eq 'algorithms\\s*:\\s*\\[' \"$f\"; then\n    echo \"::error\
        \ file=$f::jwt.verify() called without algorithms whitelist\"\n    FOUND=1\n\
        \  fi\ndone\n# 3. Cookie writes for auth must include sameSite + secure\n\
        for f in $(grep -rl 'res\\.cookie' src/ 2>/dev/null); do\n  grep -nE 'res\\\
        .cookie\\(' \"$f\" | while read -r line; do\n    if ! grep -Eq 'sameSite|secure\\\
        s*:\\s*true' <(echo \"$line\"); then\n      echo \"::warning file=$f::$line\
        \ -> res.cookie missing sameSite/secure\"\n    fi\n  done\ndone\n# 4. Reject\
        \ jwt.decode() used for authorization decisions\nif grep -rEn 'jwt\\.decode\\\
        ([^)]+\\)\\s*&&|if\\s*\\([^)]*jwt\\.decode' src/ 2>/dev/null; then\n  echo\
        \ \"::error ::jwt.decode() used in an authorization branch; must use jwt.verify()\"\
        \n  FOUND=1\nfi\nexit $FOUND\n"
    - name: Ensure auth-jwt-results.sarif exists (fallback for 0 findings)
      if: always()
      run: "if [ ! -s auth-jwt-results.sarif ]; then\n  echo \"::notice::auth-jwt\
        \ found 0 findings. Generating empty SARIF to satisfy upload-sarif.\"\n  printf\
        \ '%s\\n' \\\n    '{' \\\n    '  \"version\": \"2.1.0\",' \\\n    '  \"$schema\"\
        : \"https://json.schemastore.org/sarif-2.1.0.json\",' \\\n    '  \"runs\"\
        : [' \\\n    '    {' \\\n    '      \"tool\": {' \\\n    '        \"driver\"\
        : {' \\\n    '          \"name\": \"auth-jwt\",' \\\n    '          \"version\"\
        : \"0.65.0\",' \\\n    '          \"informationUri\": \"https://aquasecurity.github.io/trivy/\"\
        ' \\\n    '        }' \\\n    '      },' \\\n    '      \"results\": []' \\\
        \n    '    }' \\\n    '  ]' \\\n    '}' > auth-jwt-results.sarif\nfi\necho\
        \ \"\u2713 auth-jwt-results.sarif size: $(stat -c%s auth-jwt-results.sarif)\
        \ bytes\"\n"
    - name: Upload auth-jwt SARIF to GitHub Code Scanning
      if: always()
      uses: github/codeql-action/upload-sarif@b1722c1245f90604c2c348f9d1624af97ea8fc6e
      with:
        sarif_file: auth-jwt-results.sarif
        category: auth-jwt
  blog-markdown-sanitize:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    needs:
    - sast
    steps:
    - name: Checkout code
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
      with:
        persist-credentials: false
    - name: scan-markdown-no-sanitize
      run: "set -e\nfail=0\n# Find marked() or markdown-it usage\nif grep -rnE 'marked\\\
        s*\\(' src/ 2>/dev/null | grep -vE 'DOMPurify|sanitize' | grep -q .; then\n\
        \  echo '::error file=src/utils/markdown.js::marked() called without DOMPurify.sanitize\
        \ \u2014 XSS via markdown'\n  fail=1\nfi\n# Find innerHTML with user content\n\
        if grep -rnE 'innerHTML\\s*=\\s*\\$\\{?\\s*(content|post|comment|body)' src/\
        \ 2>/dev/null | grep -q .; then\n  echo '::error file=src/routes/posts.js::innerHTML\
        \ assigned from user content \u2014 use textContent or DOMPurify'\n  fail=1\n\
        fi\nexit $fail\n"
    - name: Ensure blog-markdown-xss-results.sarif exists (fallback for 0 findings)
      if: always()
      run: "if [ ! -s blog-markdown-xss-results.sarif ]; then\n  echo \"::notice::blog-markdown-xss\
        \ found 0 findings. Generating empty SARIF to satisfy upload-sarif.\"\n  printf\
        \ '%s\\n' \\\n    '{' \\\n    '  \"version\": \"2.1.0\",' \\\n    '  \"$schema\"\
        : \"https://json.schemastore.org/sarif-2.1.0.json\",' \\\n    '  \"runs\"\
        : [' \\\n    '    {' \\\n    '      \"tool\": {' \\\n    '        \"driver\"\
        : {' \\\n    '          \"name\": \"blog-markdown-xss\",' \\\n    '      \
        \    \"version\": \"0.65.0\",' \\\n    '          \"informationUri\": \"https://aquasecurity.github.io/trivy/\"\
        ' \\\n    '        }' \\\n    '      },' \\\n    '      \"results\": []' \\\
        \n    '    }' \\\n    '  ]' \\\n    '}' > blog-markdown-xss-results.sarif\n\
        fi\necho \"\u2713 blog-markdown-xss-results.sarif size: $(stat -c%s blog-markdown-xss-results.sarif)\
        \ bytes\"\n"
    - name: Upload blog-markdown-xss SARIF to GitHub Code Scanning
      if: always()
      uses: github/codeql-action/upload-sarif@b1722c1245f90604c2c348f9d1624af97ea8fc6e
      with:
        sarif_file: blog-markdown-xss-results.sarif
        category: blog-markdown-xss
  blog-comment-csrf-auth:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    needs:
    - sast
    steps:
    - name: Checkout code
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
      with:
        persist-credentials: false
    - name: scan-comment-csrf-auth
      run: "set -e\nfail=0\n# Check CSRF middleware present\nif ! grep -rnE '(csurf|csrf\\\
        (\\)|doubleCsrf)' src/ 2>/dev/null | grep -q .; then\n  echo '::warning file=src/server.js::No\
        \ CSRF protection detected \u2014 install csurf or double-submit cookie pattern'\n\
        \  fail=1\nfi\nexit $fail\n"
    - name: Ensure blog-csrf-results.sarif exists (fallback for 0 findings)
      if: always()
      run: "if [ ! -s blog-csrf-results.sarif ]; then\n  echo \"::notice::blog-csrf\
        \ found 0 findings. Generating empty SARIF to satisfy upload-sarif.\"\n  printf\
        \ '%s\\n' \\\n    '{' \\\n    '  \"version\": \"2.1.0\",' \\\n    '  \"$schema\"\
        : \"https://json.schemastore.org/sarif-2.1.0.json\",' \\\n    '  \"runs\"\
        : [' \\\n    '    {' \\\n    '      \"tool\": {' \\\n    '        \"driver\"\
        : {' \\\n    '          \"name\": \"blog-csrf\",' \\\n    '          \"version\"\
        : \"0.65.0\",' \\\n    '          \"informationUri\": \"https://aquasecurity.github.io/trivy/\"\
        ' \\\n    '        }' \\\n    '      },' \\\n    '      \"results\": []' \\\
        \n    '    }' \\\n    '  ]' \\\n    '}' > blog-csrf-results.sarif\nfi\necho\
        \ \"\u2713 blog-csrf-results.sarif size: $(stat -c%s blog-csrf-results.sarif)\
        \ bytes\"\n"
    - name: Upload blog-csrf SARIF to GitHub Code Scanning
      if: always()
      uses: github/codeql-action/upload-sarif@b1722c1245f90604c2c348f9d1624af97ea8fc6e
      with:
        sarif_file: blog-csrf-results.sarif
        category: blog-csrf
  blog-csp-security-headers:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    needs:
    - sast
    steps:
    - name: Checkout code
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
      with:
        persist-credentials: false
    - name: scan-csp-headers
      run: "set -e\nfail=0\n# Check helmet middleware\nif ! grep -rnE 'helmet\\s*\\\
        (' src/ 2>/dev/null | grep -q .; then\n  echo '::warning file=src/server.js::helmet()\
        \ middleware missing \u2014 CSP/HSTS/X-Frame-Options not set'\n  fail=1\n\
        fi\nexit $fail\n"
    - name: Ensure blog-csp-results.sarif exists (fallback for 0 findings)
      if: always()
      run: "if [ ! -s blog-csp-results.sarif ]; then\n  echo \"::notice::blog-csp\
        \ found 0 findings. Generating empty SARIF to satisfy upload-sarif.\"\n  printf\
        \ '%s\\n' \\\n    '{' \\\n    '  \"version\": \"2.1.0\",' \\\n    '  \"$schema\"\
        : \"https://json.schemastore.org/sarif-2.1.0.json\",' \\\n    '  \"runs\"\
        : [' \\\n    '    {' \\\n    '      \"tool\": {' \\\n    '        \"driver\"\
        : {' \\\n    '          \"name\": \"blog-csp\",' \\\n    '          \"version\"\
        : \"0.65.0\",' \\\n    '          \"informationUri\": \"https://aquasecurity.github.io/trivy/\"\
        ' \\\n    '        }' \\\n    '      },' \\\n    '      \"results\": []' \\\
        \n    '    }' \\\n    '  ]' \\\n    '}' > blog-csp-results.sarif\nfi\necho\
        \ \"\u2713 blog-csp-results.sarif size: $(stat -c%s blog-csp-results.sarif)\
        \ bytes\"\n"
    - name: Upload blog-csp SARIF to GitHub Code Scanning
      if: always()
      uses: github/codeql-action/upload-sarif@b1722c1245f90604c2c348f9d1624af97ea8fc6e
      with:
        sarif_file: blog-csp-results.sarif
        category: blog-csp
