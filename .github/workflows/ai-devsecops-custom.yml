name: "AI DevSecOps \u2014 Domain Compliance (blog)"
'on':
  workflow_call:
    inputs:
      detected_domain:
        description: Domain classification from the AI agent.
        required: false
        type: string
        default: blog
permissions:
  contents: read
  security-events: write
jobs:
  blog-markdown-xss-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
    - name: Checkout code
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
      with:
        persist-credentials: false
    - name: detect-marked-without-sanitizer
      run: "set -e\nmkdir -p sarif-output\n# 1. Find all call sites of marked() in\
        \ application code (exclude node_modules and views/templates)\nif grep -rEn\
        \ \"\\bmarked\\s*\\(\" --include=\"*.js\" --include=\"*.ejs\" --exclude-dir=node_modules\
        \ --exclude-dir=views . ; then\n  MARKED_FOUND=1\nelse\n  MARKED_FOUND=0\n\
        fi\n# 2. Look for any HTML/Markdown sanitizer library (DOMPurify, sanitize-html,\
        \ xss)\nif grep -rEn \"require\\(['\\\"]dompurify['\\\"]\\)|require\\(['\\\
        \"]sanitize-html['\\\"]\\)|require\\(['\\\"]xss['\\\"]\\)|DOMPurify\\.sanitize|sanitizeHtml\\\
        (\" --include=\"*.js\" --exclude-dir=node_modules . ; then\n  SANITIZER_FOUND=1\n\
        else\n  SANITIZER_FOUND=0\nfi\n# 3. Look for EJS unescaped output blocks adjacent\
        \ to content variables (heuristic)\nif grep -rEn \"<%-\\s*.*(content|body|markdown|post|comment)\"\
        \ --include=\"*.ejs\" --exclude-dir=node_modules views/ 2>/dev/null ; then\n\
        \  EJS_UNESCAPED=1\nelse\n  EJS_UNESCAPED=0\nfi\n# Fail if marked is used\
        \ without a sanitizer\nif [ \"$MARKED_FOUND\" = \"1\" ] && [ \"$SANITIZER_FOUND\"\
        \ = \"0\" ]; then\n  echo \"::error title=Unsafe Markdown rendering::marked()\
        \ detected without DOMPurify/sanitize-html/xss - stored XSS in blog posts\
        \ and comments\"\n  exit 1\nfi\nif [ \"$EJS_UNESCAPED\" = \"1\" ] && [ \"\
        $SANITIZER_FOUND\" = \"0\" ]; then\n  echo \"::error title=Unescaped EJS output::EJS\
        \ <%- %> output of user content without sanitizer detected\"\n  exit 1\nfi\n\
        echo \"OK: Markdown rendering is sanitized or no marked() usage found.\"\n"
    - name: marked-no-sanitize-inline-rule
      run: 'echo ''AI-designed Semgrep rule (id=ai-rule):''

        echo ''Rule body:''

        cat <<''SEMGREP_EOF'' | sed ''s/^/  /''


        SEMGREP_EOF

        '
    - name: Convert sast annotations to SARIF
      if: always()
      env:
        SARIF_PATH: sast-results.sarif
      uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea
      with:
        script: "const { owner, repo } = context.repo;\nconst runId = context.runId;\n\
          const jobName = context.job;\nconst fs = require('fs');\nconst path = require('path');\n\
          const sarifPath = process.env.SARIF_PATH;\nconst toolName = 'sast';\nconst\
          \ toolVersion = '1.0.0';\nconst informationUri = 'https://github.com/iqbalrsyd/ai-devsecops';\n\
          const ruleIdPrefix = 'ai-devsecops-sast';\n\n// Fetch all annotations for\
          \ this run (max 100; for bigger\n// runs, paginate via per_page=100 + page=N).\n\
          let annotations = [];\nlet page = 1;\nwhile (true) {\n  const { data } =\
          \ await github.rest.actions.listWorkflowRunAnnotations({\n    owner, repo,\
          \ run_id: runId, per_page: 100, page,\n  });\n  if (!data || data.length\
          \ === 0) break;\n  annotations = annotations.concat(data);\n  if (data.length\
          \ < 100) break;\n  page++;\n}\n\n// Filter annotations to those produced\
          \ in the current job.\n// `job_name` is set on each annotation when the\
          \ runner\n// resolves the workflow step context.\nconst jobAnnotations =\
          \ annotations.filter(a => a.job_name === jobName);\nif (jobAnnotations.length\
          \ === 0) {\n  core.info(`No annotations found for job ${jobName}; SARIF\
          \ generation skipped.`);\n  // Ensure the SARIF file exists (so upload-sarif\
          \ does not\n  // fail with \"Path does not exist\"). The fallback step may\n\
          \  // have already created an empty one.\n  if (!fs.existsSync(sarifPath))\
          \ {\n    fs.writeFileSync(sarifPath, JSON.stringify({\n      version: '2.1.0',\n\
          \      $schema: 'https://json.schemastore.org/sarif-2.1.0.json',\n     \
          \ runs: [{ tool: { driver: { name: toolName, version: toolVersion, informationUri\
          \ } }, results: [] }],\n    }, null, 2));\n  }\n  return;\n}\n\n// Map each\
          \ annotation to a SARIF result. Annotations look like:\n//   { path: 'src/server.js',\
          \ start_line: 33, end_line: 33,\n//     annotation_level: 'warning' | 'failure',\n\
          //     message: 'No CSRF protection detected \u2026' }\n// GitHub sets `annotation_level='failure'`\
          \ for `::error` and\n// `'warning'` for `::warning`. We map both to SARIF\
          \ results\n// with severity WARNING (warning) or ERROR (failure).\nconst\
          \ levelMap = { failure: 'error', warning: 'warning' };\nconst results =\
          \ jobAnnotations.map((a, idx) => {\n  const level = levelMap[a.annotation_level]\
          \ || 'note';\n  // Build a stable rule id from the tool + path + first word\
          \ of\n  // the message. This keeps alerts deduped across runs.\n  const\
          \ slug = (a.message || 'finding').toLowerCase()\n    .replace(/[^a-z0-9]+/g,\
          \ '-').replace(/^-+|-+$/g, '').slice(0, 40);\n  const ruleId = `${ruleIdPrefix}-${slug}-${a.start_line\
          \ || 0}-${idx}`;\n  return {\n    ruleId,\n    level,\n    message: { text:\
          \ a.message || '(no message)' },\n    locations: [{\n      physicalLocation:\
          \ {\n        artifactLocation: { uri: a.path || 'unknown' },\n        region:\
          \ { startLine: a.start_line || 1, endLine: a.end_line || a.start_line ||\
          \ 1 },\n      },\n    }],\n  };\n});\n\n// Build the SARIF document. If\
          \ the file already exists (from\n// an earlier scanner or the fallback),\
          \ merge results into the\n// first run; otherwise create a fresh document.\n\
          let doc;\nif (fs.existsSync(sarifPath)) {\n  try {\n    doc = JSON.parse(fs.readFileSync(sarifPath,\
          \ 'utf8'));\n  } catch (e) {\n    core.warning(`Existing SARIF at ${sarifPath}\
          \ is not valid JSON; regenerating.`);\n    doc = null;\n  }\n}\nif (!doc\
          \ || !Array.isArray(doc.runs) || doc.runs.length === 0) {\n  doc = {\n \
          \   version: '2.1.0',\n    $schema: 'https://json.schemastore.org/sarif-2.1.0.json',\n\
          \    runs: [{\n      tool: { driver: { name: toolName, version: toolVersion,\
          \ informationUri, rules: [] } },\n      results: [],\n    }],\n  };\n}\n\
          // Ensure the first run's driver.name matches our tool (so the\n// Code\
          \ Scanning tab attributes the alerts to this job's\n// scanner rather than\
          \ the fallback's empty driver).\ndoc.runs[0].tool.driver.name = toolName;\n\
          doc.runs[0].tool.driver.version = toolVersion;\ndoc.runs[0].tool.driver.informationUri\
          \ = informationUri;\ndoc.runs[0].results = (doc.runs[0].results || []).concat(results);\n\
          \nfs.writeFileSync(sarifPath, JSON.stringify(doc, null, 2));\ncore.info(`Wrote\
          \ ${results.length} SARIF result(s) to ${sarifPath} (annotations from job\
          \ ${jobName}).`);\n"
    - name: Ensure sast-results.sarif exists (fallback for 0 findings)
      if: always()
      run: "if [ ! -s sast-results.sarif ]; then\n  echo \"::notice::sast found 0\
        \ findings. Generating empty SARIF to satisfy upload-sarif.\"\n  printf '%s\\\
        n' \\\n    '{' \\\n    '  \"version\": \"2.1.0\",' \\\n    '  \"$schema\"\
        : \"https://json.schemastore.org/sarif-2.1.0.json\",' \\\n    '  \"runs\"\
        : [' \\\n    '    {' \\\n    '      \"tool\": {' \\\n    '        \"driver\"\
        : {' \\\n    '          \"name\": \"sast\",' \\\n    '          \"version\"\
        : \"0.65.0\",' \\\n    '          \"informationUri\": \"https://aquasecurity.github.io/trivy/\"\
        ' \\\n    '        }' \\\n    '      },' \\\n    '      \"results\": []' \\\
        \n    '    }' \\\n    '  ]' \\\n    '}' > sast-results.sarif\nfi\necho \"\u2713\
        \ sast-results.sarif size: $(stat -c%s sast-results.sarif) bytes\"\n"
    - name: Upload sast SARIF to GitHub Code Scanning
      if: always()
      uses: github/codeql-action/upload-sarif@b1722c1245f90604c2c348f9d1624af97ea8fc6e
      with:
        sarif_file: sast-results.sarif
        category: sast
  multer-upload-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
    - name: Checkout code
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
      with:
        persist-credentials: false
    - name: verify-multer-filefilter-and-limits
      run: "set -e\nmkdir -p sarif-output\n# 1. Confirm multer is required somewhere\
        \ in app code\nMULTER_REQUIRES=$(grep -rEn \"require\\(['\\\"]multer['\\\"\
        ]\\)\" --include=\"*.js\" --exclude-dir=node_modules . || true)\nif [ -z \"\
        $MULTER_REQUIRES\" ]; then\n  echo \"OK: multer not used in this codebase\
        \ - skipping.\"\n  exit 0\nfi\necho \"$MULTER_REQUIRES\"\n# 2. Locate multer()\
        \ instantiation sites (any of: multer({...}), multer().single(), multer().array())\n\
        INSTANTIATIONS=$(grep -rEn \"multer\\s*\\(\" --include=\"*.js\" --exclude-dir=node_modules\
        \ . || true)\necho \"$INSTANTIATIONS\"\n# 3. Check that EACH instantiation\
        \ in app code defines fileFilter\nNO_FILEFILTER=$(grep -rEn \"multer\\s*\\\
        (\" --include=\"*.js\" --exclude-dir=node_modules . | grep -v \"fileFilter\"\
        \ | grep -v \"multer\\.diskStorage\\|multer\\.memoryStorage\" || true)\n#\
        \ 4. Check that limits: {...} is set\nNO_LIMITS=$(grep -rEn \"multer\\s*\\\
        (\" --include=\"*.js\" --exclude-dir=node_modules . | grep -v \"limits\" ||\
        \ true)\nFAILED=0\nif [ -n \"$NO_FILEFILTER\" ]; then\n  echo \"::error title=Missing\
        \ multer.fileFilter::multer() called without fileFilter - any file type can\
        \ be uploaded\"\n  echo \"$NO_FILEFILTER\"\n  FAILED=1\nfi\nif [ -n \"$NO_LIMITS\"\
        \ ]; then\n  echo \"::warning title=Missing multer.limits::multer() called\
        \ without limits:{fileSize:...} - DoS via huge upload possible\"\n  echo \"\
        $NO_LIMITS\"\n  FAILED=1\nfi\n# 5. Detect classic wildcard MIME bypass\nif\
        \ grep -rEn \"fileFilter.*mimetype.*['\\\"]\\*/\\*['\\\"]|fileFilter.*mimetype.*['\\\
        \"]image/\\*['\\\"]\" --include=\"*.js\" --exclude-dir=node_modules . ; then\n\
        \  echo \"::error title=Weak multer MIME check::fileFilter uses wildcard image/*\
        \ or */* - bypassable with polyglot files\"\n  FAILED=1\nfi\nexit $FAILED\n"
    - name: multer-misconfig-inline-rule
      run: 'echo ''AI-designed Semgrep rule (id=ai-rule):''

