      with:
        sarif_file: jwt-hardening-results.sarif
        category: jwt-hardening
  multer-upload-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
    - name: Checkout code
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
      with:
        persist-credentials: false
    - name: detect-multer-misconfig
      run: "set -euo pipefail\nexec > >(tee -a multer-upload-audit.shell_log) 2>&1\n\
        FAIL=0\n\n# 1. Multer instantiated without a fileFilter (accepts any type)\n\
        NO_FILTER=$(grep -RInE --include='*.js' \\\n  'multer\\s*\\(\\s*\\{\\s*(dest|storage)\\\
        s*:' \\\n  src/ 2>/dev/null | grep -v 'fileFilter' || true)\nif [ -n \"$NO_FILTER\"\
        \ ]; then\n  echo \"::error::multer() configured with dest/storage but NO\
        \ fileFilter. Any file type (incl. .html) will be accepted:\"\n  echo \"$NO_FILTER\"\
        \n  FAIL=1\nfi\n\n# 2. Multer instantiated without a size limit (DoS via huge\
        \ upload)\nNO_LIMIT=$(grep -RInE --include='*.js' \\\n  'multer\\s*\\(\\s*\\\
        {\\s*(dest|storage)\\s*:' \\\n  src/ 2>/dev/null | grep -v 'limits' || true)\n\
        if [ -n \"$NO_LIMIT\" ]; then\n  echo \"::error::multer() configured without\
        \ limits.fileSize. Unbounded upload size (DoS):\"\n  echo \"$NO_LIMIT\"\n\
        \  FAIL=1\nfi\n\n# 3. express.static mount on the upload directory with default\
        \ content-type (serves .html as HTML)\nif grep -RInE --include='*.js' \\\n\
        \  'express\\.static\\s*\\(\\s*[^)]*(upload|uploads|public)[^)]*\\)' \\\n\
        \  src/server.js 2>/dev/null; then\n  echo \"::warning::express.static() mounted\
        \ on an upload directory. Ensure a Content-Disposition: attachment / setHeaders\
        \ hook blocks .html and .svg execution.\"\nfi\n\n# 4. Original filename used\
        \ as filesystem path (path traversal)\nTRAV=$(grep -RInE --include='*.js'\
        \ \\\n  '(req\\.file\\.originalname|file\\.originalname)\\s*\\)\\s*\\)\\]'\
        \ \\\n  src/routes/upload.js 2>/dev/null | grep -E 'path\\.(join|resolve)'\
        \ || true)\nif [ -n \"$TRAV\" ]; then\n  echo \"::error::req.file.originalname\
        \ is fed directly into path.join/resolve \u2192 directory traversal:\"\n \
        \ echo \"$TRAV\"\n  FAIL=1\nfi\n\n[ \"$FAIL\" -eq 0 ] && echo \"Multer configuration\
        \ passes audit.\" || exit 1\n"
    - name: semgrep-multer-file-upload
      run: 'echo ''AI-designed Semgrep rule (id=ai-rule):''

        echo ''Rule body:''

        cat <<''SEMGREP_EOF'' | sed ''s/^/  /''


