    continue-on-error: true
    steps:
    - name: Checkout code
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
      with:
        persist-credentials: false
    - name: scan-jwt-weak-secret
      run: "# Set up output capture for the annotation-to-SARIF step.\nexec > >(tee\
        \ -a blog-jwt-hardening.shell_log) 2>&1\n# Run the original script in a subshell\
        \ with set +e so\n# that any single command failure does not abort the\n#\
        \ script before it can emit a '::error' annotation.\ninner_exit=0\n( set +e\n\
        fail=0\n# JWT secret must come from env, not literal.\n# Use a double-quoted\
        \ bash string so the regex\nif grep -rnE \"jwt\\.sign\\s*\\([^,]+,\\s*[\\\"\
        '][A-Za-z0-9]{1,31}[\\\"']\" src/ 2>/dev/null | grep -q .; then\n  echo '::error\
        \ file=src/auth/jwt.ts::JWT signed with short/hardcoded secret'\n  fail=1\n\
        fi\n# 'none' algorithm forbidden\nif grep -rnE 'algorithm.*none|algorithms.*\\\
        [.*none' src/ 2>/dev/null | grep -q .; then\n  echo '::error file=src/auth/jwt.ts::JWT\
        \ verify accepts alg=none \u2014 algorithm confusion attack (CVE-2015-9235)'\n\
        \  fail=1\nfi\nexit $fail\n) || inner_exit=$?\n# If the inner script exited\
        \ non-zero and emitted no\n# '::error'/'::warning' annotation, synthesise\
        \ one so the\n# SARIF conversion step still has a finding to record.\nif [\
        \ \"$inner_exit\" -ne 0 ] && ! grep -qE '^::(error|warning)' blog-jwt-hardening.shell_log;\
        \ then\n  echo \"::error file=scan-jwt-weak-secret::shell check failed (exit\
        \ code $inner_exit) \u2014 see run log for details\"\nfi\nexit $inner_exit\n"
    - name: Convert blog-jwt-hardening shell_check annotations to SARIF
      if: always()
      run: "cat > blog-jwt-hardening_annotations_to_sarif.py <<'PY_EOF'\nimport os,\
        \ re, json\nlog_path = 'blog-jwt-hardening.shell_log'\nsarif_path = 'blog-jwt-hardening-results.sarif'\n\
        tool_name = 'blog-jwt-hardening'\ntool_version = '1.0.0'\ninformation_uri\
        \ = 'https://github.com/iqbalrsyd/ai-devsecops'\nrule_id_prefix = 'ai-devsecops-blog-jwt-hardening'\n\
        results = []\nif os.path.exists(log_path):\n    pat = re.compile(r'^::(error|warning)(?:\
        \ file=([^,]+))?(?:,line=(\\d+))?(?:,endLine=(\\d+))?::(.*)$')\n    for idx,\
        \ line in enumerate(open(log_path, encoding='utf-8', errors='replace')):\n\
        \        m = pat.match(line.rstrip('\\n'))\n        if not m:\n          \
        \  continue\n        level, path, sl, el, msg = m.groups()\n        sl = int(sl)\
        \ if sl else 1\n        el = int(el) if el else sl\n        if level == 'error':\n\
        \            sarif_level = 'error'\n        else:\n            sarif_level\
        \ = 'warning'\n        msg = msg.strip()\n        slug = re.sub(r'[^a-z0-9]+',\
        \ '-', (msg or 'finding').lower())[:50].strip('-')\n        rule_id = f'{rule_id_prefix}-{slug}-{sl}-{idx}'\n\
        \        results.append({\n            'ruleId': rule_id,\n            'level':\
        \ sarif_level,\n            'message': {'text': msg or '(no message)'},\n\
        \            'locations': [{\n                'physicalLocation': {\n    \
        \                'artifactLocation': {'uri': path or 'unknown'},\n       \
        \             'region': {'startLine': sl, 'endLine': el},\n              \
        \  },\n            }],\n        })\nexisting = {}\nif os.path.exists(sarif_path)\
        \ and os.path.getsize(sarif_path) > 0:\n    try:\n        existing = json.load(open(sarif_path,\
        \ encoding='utf-8'))\n    except Exception:\n        existing = {}\nif not\
        \ existing or 'runs' not in existing or not existing['runs']:\n    existing\
        \ = {\n        'version': '2.1.0',\n        '$schema': 'https://json.schemastore.org/sarif-2.1.0.json',\n\
        \        'runs': [{\n            'tool': {'driver': {\n                'name':\
        \ tool_name, 'version': tool_version, 'informationUri': information_uri,\n\
        \            }},\n            'results': [],\n        }],\n    }\nexisting['runs'][0]['tool']['driver']['name']\
        \ = tool_name\nexisting['runs'][0]['tool']['driver']['version'] = tool_version\n\
        existing['runs'][0]['tool']['driver']['informationUri'] = information_uri\n\
        existing['runs'][0]['results'] = (existing['runs'][0].get('results') or [])\
        \ + results\nwith open(sarif_path, 'w', encoding='utf-8') as f:\n    json.dump(existing,\
        \ f, indent=2)\nprint(f'Wrote {len(results)} SARIF result(s) to {sarif_path}')\n\
        PY_EOF\npython3 blog-jwt-hardening_annotations_to_sarif.py\n"
    - name: Ensure blog-jwt-hardening-results.sarif exists (fallback for 0 findings)
      if: always()
      run: "if [ ! -s blog-jwt-hardening-results.sarif ]; then\n  echo \"::notice::blog-jwt-hardening\
        \ found 0 findings. Generating empty SARIF to satisfy upload-sarif.\"\n  printf\
        \ '%s\\n' \\\n    '{' \\\n    '  \"version\": \"2.1.0\",' \\\n    '  \"$schema\"\
        : \"https://json.schemastore.org/sarif-2.1.0.json\",' \\\n    '  \"runs\"\
        : [' \\\n    '    {' \\\n    '      \"tool\": {' \\\n    '        \"driver\"\
        : {' \\\n    '          \"name\": \"blog-jwt-hardening\",' \\\n    '     \
        \     \"version\": \"0.65.0\",' \\\n    '          \"informationUri\": \"\
        https://aquasecurity.github.io/trivy/\"' \\\n    '        }' \\\n    '   \
        \   },' \\\n    '      \"results\": []' \\\n    '    }' \\\n    '  ]' \\\n\
        \    '}' > blog-jwt-hardening-results.sarif\nfi\necho \"\u2713 blog-jwt-hardening-results.sarif\
        \ size: $(stat -c%s blog-jwt-hardening-results.sarif) bytes\"\n"
    - name: Upload blog-jwt-hardening SARIF to GitHub Code Scanning
      if: always()
      uses: github/codeql-action/upload-sarif@b1722c1245f90604c2c348f9d1624af97ea8fc6e
      with:
        sarif_file: blog-jwt-hardening-results.sarif
        category: blog-jwt-hardening
