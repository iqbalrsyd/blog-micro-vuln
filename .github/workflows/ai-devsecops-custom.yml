        \ file=([^,]+))?(?:,line=(\\d+))?(?:,endLine=(\\d+))?::(.*)$')\n      for\
        \ idx, line in enumerate(open(log_path, encoding='utf-8', errors='replace')):\n\
        \          m = pat.match(line.rstrip('\\n'))\n          if not m:\n      \
        \        continue\n          level, path, sl, el, msg = m.groups()\n     \
        \     sl = int(sl) if sl else 1\n          el = int(el) if el else sl\n  \
        \        if level == 'error':\n              sarif_level = 'error'\n     \
