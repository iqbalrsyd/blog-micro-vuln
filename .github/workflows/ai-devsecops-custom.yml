name: "AI DevSecOps \u2014 Domain Compliance (blog)"
'on':
  workflow_call:
    inputs:
      detected_domain:
        description: Domain classification from the AI agent.
        required: false
        type: string
        default: blog
permissions:
  contents: read
  security-events: write
jobs:
  cms-marked-xss-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
    - name: Checkout code
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
      with:
        persist-credentials: false
    - name: detect-unsafe-marked-call-and-missing-sanitizer
      run: "set -o pipefail\n{\nset -e\necho \"::group::Scanning for marked() without\
        \ sanitize option\"\n# Find every call site of marked/marked.parse in the\
        \ blog code\nUNSAFE=$(grep -rEn 'marked\\s*\\(|marked\\.parse\\s*\\(' src/\
        \ views/ --include='*.js' --include='*.ejs' 2>/dev/null | grep -viE 'sanitize\\\
        s*:\\s*true' || true)\nif [ -n \"$UNSAFE\" ]; then\n  echo \"::error file=src/routes/posts.js::marked()\
        \ invoked without sanitize:true - stored XSS in blog posts/comments\"\n  echo\
        \ \"$UNSAFE\" | while IFS= read -r line; do echo \"::error::$line\"; done\n\
        \  FOUND=1\nfi\n# Verify a sanitizer is actually present downstream (DOMPurify\
        \ or sanitize-html)\nif ! grep -qE '\"(dompurify|sanitize-html)\"' package.json;\
        \ then\n  echo \"::error file=package.json::No HTML sanitizer (dompurify/sanitize-html)\
        \ declared - rendered Markdown stays raw\"\n  FOUND=1\nfi\n# Ensure EJS does\
        \ not disable auto-escaping via <%- %> around marked output\nif grep -rEn\
        \ '<%-.*(marked|post|comment|content).*%>' views/ 2>/dev/null; then\n  echo\
        \ \"::error file=views/*.ejs::Raw <%- %> used on markdown-derived content\
        \ - bypasses EJS escaping\"\n  FOUND=1\nfi\n[ -z \"$FOUND\" ] && echo \"OK:\
        \ marked calls appear sanitized\"\n} 2>&1 | tee -a cms-marked-xss.shell_log\n"
    - name: marked-no-sanitize-inline-rule
      run: "echo 'AI-designed Semgrep rule (id=ai-rule):'\necho 'Rule body:'\ncat\
        \ <<'SEMGREP_EOF' | sed 's/^/  /'\nrules:\n  - id: blog-marked-missing-sanitize\n\
        \    languages: [javascript, typescript]\n    severity: ERROR\n    message:\
        \ |\n      marked()/marked.parse() called without {sanitize:true} in this\
        \ blog codebase\n      (routes/posts.js, routes/comments.js). User-supplied\
        \ Markdown in posts and\n      comments is rendered into EJS views, enabling\
        \ stored XSS (CWE-79).\n    metadata:\n      category: security\n      cwe:\
        \ \"CWE-79: Improper Neutralization of Input During Web Page Generation\"\n\
        \      technology: [express, ejs, marked]\n      confidence: HIGH\n    patterns:\n\
        \      - pattern-either:\n          - pattern: marked($INPUT, $OPTS)\n   \
        \       - pattern: marked.parse($INPUT, $OPTS)\n          - pattern: marked($INPUT)\n\
        \          - pattern: marked.parse($INPUT)\n      - pattern-not: marked($INPUT,\
        \ {sanitize: true, ...})\n      - pattern-not: marked.parse($INPUT, {sanitize:\
        \ true, ...})\nSEMGREP_EOF\n"
    - name: Convert cms-marked-xss shell_check annotations to SARIF
      if: always()
      run: "python3 - <<'PYEOF'\n  import os, re, json\n  log_path = 'cms-marked-xss.shell_log'\n\
        \  sarif_path = 'cms-marked-xss-results.sarif'\n  tool_name = 'cms-marked-xss'\n\
        \  tool_version = '1.0.0'\n  information_uri = 'https://github.com/iqbalrsyd/ai-devsecops'\n\
        \  rule_id_prefix = 'ai-devsecops-cms-marked-xss'\n  results = []\n  if os.path.exists(log_path):\n\
        \      pat = re.compile(r'^::(error|warning)(?: file=([^,]+))?(?:,line=(\\\
        d+))?(?:,endLine=(\\d+))?::(.*)$')\n      for idx, line in enumerate(open(log_path,\
        \ encoding='utf-8', errors='replace')):\n          m = pat.match(line.rstrip('\\\
        n'))\n          if not m:\n              continue\n          level, path,\
        \ sl, el, msg = m.groups()\n          sl = int(sl) if sl else 1\n        \
        \  el = int(el) if el else sl\n          if level == 'error':\n          \
        \    sarif_level = 'error'\n          else:\n              sarif_level = 'warning'\n\
        \          msg = msg.strip()\n          slug = re.sub(r'[^a-z0-9]+', '-',\
        \ (msg or 'finding').lower())[:50].strip('-')\n          rule_id = f'{rule_id_prefix}-{slug}-{sl}-{idx}'\n\
        \          results.append({\n              'ruleId': rule_id,\n          \
        \    'level': sarif_level,\n              'message': {'text': msg or '(no\
        \ message)'},\n              'locations': [{\n                  'physicalLocation':\
        \ {\n                      'artifactLocation': {'uri': path or 'unknown'},\n\
        \                      'region': {'startLine': sl, 'endLine': el},\n     \
        \             },\n              }],\n          })\n  existing = {}\n  if os.path.exists(sarif_path)\
        \ and os.path.getsize(sarif_path) > 0:\n      try:\n          existing = json.load(open(sarif_path,\
        \ encoding='utf-8'))\n      except Exception:\n          existing = {}\n \
        \ if not existing or 'runs' not in existing or not existing['runs']:\n   \
        \   existing = {\n          'version': '2.1.0',\n          '$schema': 'https://json.schemastore.org/sarif-2.1.0.json',\n\
        \          'runs': [{\n              'tool': {'driver': {\n              \
        \    'name': tool_name, 'version': tool_version, 'informationUri': information_uri,\n\
        \              }},\n              'results': [],\n          }],\n      }\n\
        \  existing['runs'][0]['tool']['driver']['name'] = tool_name\n  existing['runs'][0]['tool']['driver']['version']\
        \ = tool_version\n  existing['runs'][0]['tool']['driver']['informationUri']\
        \ = information_uri\n  existing['runs'][0]['results'] = (existing['runs'][0].get('results')\
        \ or []) + results\n  with open(sarif_path, 'w', encoding='utf-8') as f:\n\
        \      json.dump(existing, f, indent=2)\n  print(f'Wrote {len(results)} SARIF\
        \ result(s) to {sarif_path}')\n  PYEOF\n"
    - name: Ensure cms-marked-xss-results.sarif exists (fallback for 0 findings)
      if: always()
      run: "if [ ! -s cms-marked-xss-results.sarif ]; then\n  echo \"::notice::cms-marked-xss\
        \ found 0 findings. Generating empty SARIF to satisfy upload-sarif.\"\n  printf\
        \ '%s\\n' \\\n    '{' \\\n    '  \"version\": \"2.1.0\",' \\\n    '  \"$schema\"\
        : \"https://json.schemastore.org/sarif-2.1.0.json\",' \\\n    '  \"runs\"\
        : [' \\\n    '    {' \\\n    '      \"tool\": {' \\\n    '        \"driver\"\
        : {' \\\n    '          \"name\": \"cms-marked-xss\",' \\\n    '         \
        \ \"version\": \"0.65.0\",' \\\n    '          \"informationUri\": \"https://aquasecurity.github.io/trivy/\"\
        ' \\\n    '        }' \\\n    '      },' \\\n    '      \"results\": []' \\\
        \n    '    }' \\\n    '  ]' \\\n    '}' > cms-marked-xss-results.sarif\nfi\n\
        echo \"\u2713 cms-marked-xss-results.sarif size: $(stat -c%s cms-marked-xss-results.sarif)\
        \ bytes\"\n"
    - name: Upload cms-marked-xss SARIF to GitHub Code Scanning
      if: always()
      uses: github/codeql-action/upload-sarif@b1722c1245f90604c2c348f9d1624af97ea8fc6e
      with:
        sarif_file: cms-marked-xss-results.sarif
        category: cms-marked-xss
  multer-upload-hardening:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
    - name: Checkout code
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
      with:
        persist-credentials: false
    - name: audit-multer-filefilter-limits-and-extensions
      run: "set -o pipefail\n{\nset -e\nUPLOAD=$(find src/routes src -maxdepth 3 -name\
        \ 'upload*.js' 2>/dev/null | head -1)\nif [ -z \"$UPLOAD\" ]; then\n  echo\
        \ \"::error::upload.js not located under src/routes - cannot audit multer\
        \ config\"\n  exit 1\nfi\necho \"Auditing $UPLOAD\"\n\n# 1. fileFilter is\
        \ mandatory\nif ! grep -qE 'fileFilter\\s*[:(]' \"$UPLOAD\"; then\n  echo\
        \ \"::error file=$UPLOAD::multer instantiated without fileFilter - any MIME\
        \ accepted\"\n  FOUND=1\nfi\n\n# 2. limits must cap fileSize to prevent DoS\n\
        if ! grep -qE 'limits\\s*:\\s*\\{[^}]*fileSize' \"$UPLOAD\"; then\n  echo\
        \ \"::error file=$UPLOAD::multer has no limits.fileSize - DoS via large uploads\"\
        \n  FOUND=1\nfi\n\n# 3. Reject dangerous extensions in the allowlist (HTML/JS/SVG/EXE)\n\
        if grep -qE \"['\\\"](js|mjs|html|htm|svg|exe|bat|cmd|sh|php|asp|aspx|jsp)['\\\
        \"]\" \"$UPLOAD\"; then\n  echo \"::error file=$UPLOAD::Dangerous extension\
        \ present in multer fileFilter allowlist\"\n  FOUND=1\nfi\n\n# 4. Static serving\
        \ of upload dir must not use '*' route or root\nif grep -qE \"express\\.static\\\
        ([^)]*['\\\"]\\\\.['\\\"]\" src/server.js 2>/dev/null; then\n  echo \"::error\
        \ file=src/server.js::Static middleware serves whole directory - uploaded\
        \ .html/.svg are executable\"\n  FOUND=1\nfi\n\n# 5. Filename should be randomised\
        \ (no original name echo)\nif grep -qE 'filename\\s*:\\s*\\(.*file\\.originalname'\
        \ \"$UPLOAD\"; then\n  echo \"::error file=$UPLOAD::diskStorage uses file.originalname\
        \ verbatim - path traversal & overwrite risk\"\n  FOUND=1\nfi\n[ -z \"$FOUND\"\
        \ ] && echo \"OK: multer upload route looks hardened\"\n} 2>&1 | tee -a multer-upload-hardening.shell_log\n"
    - name: multer-missing-filefilter-inline-rule
      run: "echo 'AI-designed Semgrep rule (id=ai-rule):'\necho 'Rule body:'\ncat\
        \ <<'SEMGREP_EOF' | sed 's/^/  /'\nrules:\n  - id: blog-multer-no-filefilter\n\
        \    languages: [javascript, typescript]\n    severity: ERROR\n    message:\
        \ |\n      multer({...}) / multer.diskStorage({...}) in src/routes/upload.js\
        \ is created\n      without a fileFilter. In this blog's image upload flow,\
        \ attackers can upload\n      .svg (with embedded JS), .html, or .js files\
        \ that get served from /public,\n      resulting in stored XSS (CWE-434) across\
        \ all readers.\n    metadata:\n      category: security\n      cwe: \"CWE-434:\
        \ Unrestricted Upload of File with Dangerous Type\"\n      technology: [express,\
        \ multer]\n      confidence: HIGH\n    patterns:\n      - pattern-either:\n\
        \          - pattern: multer({...})\n          - pattern: multer.diskStorage({...})\n\
        \      - pattern-not: multer({fileFilter: $F, ...})\n      - pattern-not:\
        \ multer.diskStorage({fileFilter: $F, ...})\nSEMGREP_EOF\n"
    - name: Convert multer-upload-hardening shell_check annotations to SARIF
      if: always()
      run: "python3 - <<'PYEOF'\n  import os, re, json\n  log_path = 'multer-upload-hardening.shell_log'\n\
        \  sarif_path = 'multer-upload-hardening-results.sarif'\n  tool_name = 'multer-upload-hardening'\n\
        \  tool_version = '1.0.0'\n  information_uri = 'https://github.com/iqbalrsyd/ai-devsecops'\n\
        \  rule_id_prefix = 'ai-devsecops-multer-upload-hardening'\n  results = []\n\
        \  if os.path.exists(log_path):\n      pat = re.compile(r'^::(error|warning)(?:\
        \ file=([^,]+))?(?:,line=(\\d+))?(?:,endLine=(\\d+))?::(.*)$')\n      for\
        \ idx, line in enumerate(open(log_path, encoding='utf-8', errors='replace')):\n\
        \          m = pat.match(line.rstrip('\\n'))\n          if not m:\n      \
        \        continue\n          level, path, sl, el, msg = m.groups()\n     \
        \     sl = int(sl) if sl else 1\n          el = int(el) if el else sl\n  \
        \        if level == 'error':\n              sarif_level = 'error'\n     \
        \     else:\n              sarif_level = 'warning'\n          msg = msg.strip()\n\
        \          slug = re.sub(r'[^a-z0-9]+', '-', (msg or 'finding').lower())[:50].strip('-')\n\
        \          rule_id = f'{rule_id_prefix}-{slug}-{sl}-{idx}'\n          results.append({\n\
        \              'ruleId': rule_id,\n              'level': sarif_level,\n \
        \             'message': {'text': msg or '(no message)'},\n              'locations':\
        \ [{\n                  'physicalLocation': {\n                      'artifactLocation':\
        \ {'uri': path or 'unknown'},\n                      'region': {'startLine':\
        \ sl, 'endLine': el},\n                  },\n              }],\n         \
        \ })\n  existing = {}\n  if os.path.exists(sarif_path) and os.path.getsize(sarif_path)\
        \ > 0:\n      try:\n          existing = json.load(open(sarif_path, encoding='utf-8'))\n\
        \      except Exception:\n          existing = {}\n  if not existing or 'runs'\
        \ not in existing or not existing['runs']:\n      existing = {\n         \
        \ 'version': '2.1.0',\n          '$schema': 'https://json.schemastore.org/sarif-2.1.0.json',\n\
        \          'runs': [{\n              'tool': {'driver': {\n              \
        \    'name': tool_name, 'version': tool_version, 'informationUri': information_uri,\n\
        \              }},\n              'results': [],\n          }],\n      }\n\
        \  existing['runs'][0]['tool']['driver']['name'] = tool_name\n  existing['runs'][0]['tool']['driver']['version']\
        \ = tool_version\n  existing['runs'][0]['tool']['driver']['informationUri']\
        \ = information_uri\n  existing['runs'][0]['results'] = (existing['runs'][0].get('results')\
        \ or []) + results\n  with open(sarif_path, 'w', encoding='utf-8') as f:\n\
        \      json.dump(existing, f, indent=2)\n  print(f'Wrote {len(results)} SARIF\
        \ result(s) to {sarif_path}')\n  PYEOF\n"
    - name: Ensure multer-upload-hardening-results.sarif exists (fallback for 0 findings)
      if: always()
      run: "if [ ! -s multer-upload-hardening-results.sarif ]; then\n  echo \"::notice::multer-upload-hardening\
        \ found 0 findings. Generating empty SARIF to satisfy upload-sarif.\"\n  printf\
        \ '%s\\n' \\\n    '{' \\\n    '  \"version\": \"2.1.0\",' \\\n    '  \"$schema\"\
        : \"https://json.schemastore.org/sarif-2.1.0.json\",' \\\n    '  \"runs\"\
        : [' \\\n    '    {' \\\n    '      \"tool\": {' \\\n    '        \"driver\"\
        : {' \\\n    '          \"name\": \"multer-upload-hardening\",' \\\n    '\
        \          \"version\": \"0.65.0\",' \\\n    '          \"informationUri\"\
        : \"https://aquasecurity.github.io/trivy/\"' \\\n    '        }' \\\n    '\
        \      },' \\\n    '      \"results\": []' \\\n    '    }' \\\n    '  ]' \\\
        \n    '}' > multer-upload-hardening-results.sarif\nfi\necho \"\u2713 multer-upload-hardening-results.sarif\
        \ size: $(stat -c%s multer-upload-hardening-results.sarif) bytes\"\n"
    - name: Upload multer-upload-hardening SARIF to GitHub Code Scanning
      if: always()
      uses: github/codeql-action/upload-sarif@b1722c1245f90604c2c348f9d1624af97ea8fc6e
      with:
        sarif_file: multer-upload-hardening-results.sarif
        category: multer-upload-hardening
  jwt-auth-config-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
    - name: Checkout code
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
      with:
        persist-credentials: false
    - name: verify-jwt-algorithms-expiry-and-secret-strength
      run: "set -o pipefail\n{\nset -e\nAUTH=$(find src/routes src -maxdepth 3 -name\
        \ 'auth*.js' 2>/dev/null | head -1)\nif [ -z \"$AUTH\" ]; then\n  echo \"\
        ::error::routes/auth.js not found\"\n  exit 1\nfi\necho \"Auditing $AUTH\"\
        \n\n# 1. jwt.verify must pin allowed algorithms\nif ! grep -qE 'jwt\\.verify\\\
        s*\\([^)]*\\{[^{}]*algorithms' \"$AUTH\"; then\n  echo \"::error file=$AUTH::jwt.verify()\
        \ invoked without algorithms whitelist - alg=none / confusion attack possible\"\
        \n  FOUND=1\nfi\n\n# 2. Tokens must expire\nif ! grep -qE 'expiresIn\\s*:'\
        \ \"$AUTH\"; then\n  echo \"::error file=$AUTH::No expiresIn set on JWT -\
        \ leaked tokens valid forever\"\n  FOUND=1\nfi\n\n# 3. No jwt.verify using\
        \ 'none' or empty key\nif grep -qE \"jwt\\.verify\\s*\\([^,]+,\\s*(''|null|undefined|'none'|\"\
        .none.\")\" \"$AUTH\"; then\n  echo \"::error file=$AUTH::jwt.verify() called\
        \ with empty/disabled key\"\n  FOUND=1\nfi\n\n# 4. JWT_SECRET must not be\
        \ a short literal in source\nif grep -rEn \"JWT_SECRET\\s*=\\s*['\\\"][^'\\\
        \"]{0,31}['\\\"]\" src/ 2>/dev/null; then\n  echo \"::error file=src/**:JWT_SECRET\
        \ appears as short hard-coded literal (<32 chars) - offline brute-force risk\"\
        \n  FOUND=1\nfi\n\n# 5. Token must not be stored where XSS can steal it (localStorage)\n\
        if grep -rEn 'localStorage\\.setItem\\s*\\(\\s*[\"\\']token' src/views/ views/\
        \ public/ 2>/dev/null; then\n  echo \"::error::JWT stored in localStorage\
        \ - XSS-stealable; use httpOnly cookie\"\n  FOUND=1\nfi\n[ -z \"$FOUND\" ]\
        \ && echo \"OK: JWT auth configuration looks hardened\"\n} 2>&1 | tee -a jwt-auth-config.shell_log\n"
    - name: jwt-verify-no-algorithm-inline-rule
      run: "echo 'AI-designed Semgrep rule (id=ai-rule):'\necho 'Rule body:'\ncat\
        \ <<'SEMGREP_EOF' | sed 's/^/  /'\nrules:\n  - id: blog-jwt-verify-missing-algorithms\n\
        \    languages: [javascript, typescript]\n    severity: ERROR\n    message:\
        \ |\n      jwt.verify() in src/routes/auth.js called without {algorithms:[...]}\
        \ whitelist.\n      The blog uses these tokens to attribute comments and post\
        \ edits, so attackers\n      can forge admin/mod tokens via the 'alg: none'\
        \ attack or HS256/RS256 confusion\n      (CWE-347: Improper Verification of\
        \ Cryptographic Signature).\n    metadata:\n      category: security\n   \
        \   cwe: \"CWE-347: Improper Verification of Cryptographic Signature\"\n \
        \     technology: [express, jsonwebtoken]\n      confidence: HIGH\n    patterns:\n\
        \      - pattern-either:\n          - pattern: jwt.verify($TOKEN, $SECRET)\n\
        \          - pattern: jwt.verify($TOKEN, $SECRET, $CB)\n          - pattern:\
        \ jwt.verify($TOKEN, $SECRET, {expiresIn: $E})\n      - pattern-not: jwt.verify($TOKEN,\
        \ $SECRET, {algorithms: $A, ...})\n      - pattern-not: jwt.verify($TOKEN,\
        \ $SECRET, {algorithms: $A, ...}, $CB)\nSEMGREP_EOF\n"
    - name: Convert jwt-auth-config shell_check annotations to SARIF
      if: always()
      run: "python3 - <<'PYEOF'\n  import os, re, json\n  log_path = 'jwt-auth-config.shell_log'\n\
        \  sarif_path = 'jwt-auth-config-results.sarif'\n  tool_name = 'jwt-auth-config'\n\
        \  tool_version = '1.0.0'\n  information_uri = 'https://github.com/iqbalrsyd/ai-devsecops'\n\
        \  rule_id_prefix = 'ai-devsecops-jwt-auth-config'\n  results = []\n  if os.path.exists(log_path):\n\
        \      pat = re.compile(r'^::(error|warning)(?: file=([^,]+))?(?:,line=(\\\
        d+))?(?:,endLine=(\\d+))?::(.*)$')\n      for idx, line in enumerate(open(log_path,\
        \ encoding='utf-8', errors='replace')):\n          m = pat.match(line.rstrip('\\\
        n'))\n          if not m:\n              continue\n          level, path,\
        \ sl, el, msg = m.groups()\n          sl = int(sl) if sl else 1\n        \
        \  el = int(el) if el else sl\n          if level == 'error':\n          \
        \    sarif_level = 'error'\n          else:\n              sarif_level = 'warning'\n\
        \          msg = msg.strip()\n          slug = re.sub(r'[^a-z0-9]+', '-',\
        \ (msg or 'finding').lower())[:50].strip('-')\n          rule_id = f'{rule_id_prefix}-{slug}-{sl}-{idx}'\n\
        \          results.append({\n              'ruleId': rule_id,\n          \
        \    'level': sarif_level,\n              'message': {'text': msg or '(no\
        \ message)'},\n              'locations': [{\n                  'physicalLocation':\
        \ {\n                      'artifactLocation': {'uri': path or 'unknown'},\n\
        \                      'region': {'startLine': sl, 'endLine': el},\n     \
        \             },\n              }],\n          })\n  existing = {}\n  if os.path.exists(sarif_path)\
        \ and os.path.getsize(sarif_path) > 0:\n      try:\n          existing = json.load(open(sarif_path,\
        \ encoding='utf-8'))\n      except Exception:\n          existing = {}\n \
        \ if not existing or 'runs' not in existing or not existing['runs']:\n   \
        \   existing = {\n          'version': '2.1.0',\n          '$schema': 'https://json.schemastore.org/sarif-2.1.0.json',\n\
        \          'runs': [{\n              'tool': {'driver': {\n              \
        \    'name': tool_name, 'version': tool_version, 'informationUri': information_uri,\n\
        \              }},\n              'results': [],\n          }],\n      }\n\
        \  existing['runs'][0]['tool']['driver']['name'] = tool_name\n  existing['runs'][0]['tool']['driver']['version']\
        \ = tool_version\n  existing['runs'][0]['tool']['driver']['informationUri']\
        \ = information_uri\n  existing['runs'][0]['results'] = (existing['runs'][0].get('results')\
        \ or []) + results\n  with open(sarif_path, 'w', encoding='utf-8') as f:\n\
        \      json.dump(existing, f, indent=2)\n  print(f'Wrote {len(results)} SARIF\
        \ result(s) to {sarif_path}')\n  PYEOF\n"
    - name: Ensure jwt-auth-config-results.sarif exists (fallback for 0 findings)
      if: always()
      run: "if [ ! -s jwt-auth-config-results.sarif ]; then\n  echo \"::notice::jwt-auth-config\
        \ found 0 findings. Generating empty SARIF to satisfy upload-sarif.\"\n  printf\
        \ '%s\\n' \\\n    '{' \\\n    '  \"version\": \"2.1.0\",' \\\n    '  \"$schema\"\
        : \"https://json.schemastore.org/sarif-2.1.0.json\",' \\\n    '  \"runs\"\
        : [' \\\n    '    {' \\\n    '      \"tool\": {' \\\n    '        \"driver\"\
        : {' \\\n    '          \"name\": \"jwt-auth-config\",' \\\n    '        \
