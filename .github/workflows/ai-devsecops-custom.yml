name: "AI DevSecOps \u2014 Domain Compliance (blog)"
'on':
  workflow_call:
    inputs:
      detected_domain:
        description: Domain classification from the AI agent.
        required: false
        type: string
        default: blog
permissions:
  contents: read
  security-events: write
jobs:
  markdown-xss-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
    - name: Checkout code
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
      with:
        persist-credentials: false
    - name: detect-unsanitized-markdown-render
      run: "set -euo pipefail\nexec > >(tee -a markdown-xss.shell_log) 2>&1\n# Find\
        \ every place Markdown is rendered to HTML\nPATTERNS=$(grep -RInE --include='*.js'\
        \ \\\n  '(marked\\s*\\(|marked\\.parse\\s*\\(|showdown\\.Converter|\\.makeHtml\\\
        s*\\()' \\\n  src/ 2>/dev/null || true)\n\nif [ -z \"$PATTERNS\" ]; then\n\
        \  echo \"No markdown render calls found \u2014 nothing to scan.\"\n  exit\
        \ 0\nfi\necho \"$PATTERNS\"\n\n# Check that a sanitization layer is configured\
        \ somewhere in the project\nHAS_SANITIZER=$(grep -RIE --include='*.js' --include='*.json'\
        \ \\\n  '(DOMPurify|sanitize-html|sanitizeHtml|xss\\b)' \\\n  src/ package.json\
        \ 2>/dev/null | wc -l)\n\n# Check for marked's built-in sanitize option or\
        \ showdown strikethrough/sanitize config\nHAS_MARKED_SANITIZE=$(grep -RInE\
        \ --include='*.js' \\\n  '(sanitize\\s*:\\s*true|sanitize:\\s*\\{\\s*\\})'\
        \ \\\n  src/ 2>/dev/null | wc -l)\n\nif [ \"$HAS_SANITIZER\" -eq 0 ] && [\
        \ \"$HAS_MARKED_SANITIZE\" -eq 0 ]; then\n  echo \"::error::Markdown is rendered\
        \ in src/routes/posts.js or src/routes/comments.js but NO sanitization layer\
        \ (DOMPurify/sanitize-html/xss or marked sanitize:true) is present. Stored\
        \ XSS risk.\"\n  exit 1\nfi\necho \"Sanitization layer detected \u2014 OK.\"\
        \n"
    - name: semgrep-markdown-xss
      run: 'echo ''AI-designed Semgrep rule (id=ai-rule):''

        echo ''Rule body:''

        cat <<''SEMGREP_EOF'' | sed ''s/^/  /''


        SEMGREP_EOF

        '
    - name: Convert markdown-xss shell_check annotations to SARIF
      if: always()
      run: "cat > markdown-xss_annotations_to_sarif.py <<'PY_EOF'\nimport os, re,\
        \ json\nlog_path = 'markdown-xss.shell_log'\nsarif_path = 'markdown-xss-results.sarif'\n\
        tool_name = 'markdown-xss'\ntool_version = '1.0.0'\ninformation_uri = 'https://github.com/iqbalrsyd/ai-devsecops'\n\
        rule_id_prefix = 'ai-devsecops-markdown-xss'\nresults = []\nif os.path.exists(log_path):\n\
        \    pat = re.compile(r'^::(error|warning)(?: file=([^,]+))?(?:,line=(\\d+))?(?:,endLine=(\\\
        d+))?::(.*)$')\n    for idx, line in enumerate(open(log_path, encoding='utf-8',\
        \ errors='replace')):\n        m = pat.match(line.rstrip('\\n'))\n       \
        \ if not m:\n            continue\n        level, path, sl, el, msg = m.groups()\n\
        \        sl = int(sl) if sl else 1\n        el = int(el) if el else sl\n \
        \       if level == 'error':\n            sarif_level = 'error'\n        else:\n\
        \            sarif_level = 'warning'\n        msg = msg.strip()\n        slug\
        \ = re.sub(r'[^a-z0-9]+', '-', (msg or 'finding').lower())[:50].strip('-')\n\
        \        rule_id = f'{rule_id_prefix}-{slug}-{sl}-{idx}'\n        results.append({\n\
        \            'ruleId': rule_id,\n            'level': sarif_level,\n     \
        \       'message': {'text': msg or '(no message)'},\n            'locations':\
        \ [{\n                'physicalLocation': {\n                    'artifactLocation':\
        \ {'uri': path or 'unknown'},\n                    'region': {'startLine':\
        \ sl, 'endLine': el},\n                },\n            }],\n        })\nexisting\
        \ = {}\nif os.path.exists(sarif_path) and os.path.getsize(sarif_path) > 0:\n\
        \    try:\n        existing = json.load(open(sarif_path, encoding='utf-8'))\n\
        \    except Exception:\n        existing = {}\nif not existing or 'runs' not\
        \ in existing or not existing['runs']:\n    existing = {\n        'version':\
        \ '2.1.0',\n        '$schema': 'https://json.schemastore.org/sarif-2.1.0.json',\n\
        \        'runs': [{\n            'tool': {'driver': {\n                'name':\
        \ tool_name, 'version': tool_version, 'informationUri': information_uri,\n\
        \            }},\n            'results': [],\n        }],\n    }\nexisting['runs'][0]['tool']['driver']['name']\
        \ = tool_name\nexisting['runs'][0]['tool']['driver']['version'] = tool_version\n\
        existing['runs'][0]['tool']['driver']['informationUri'] = information_uri\n\
        existing['runs'][0]['results'] = (existing['runs'][0].get('results') or [])\
        \ + results\nwith open(sarif_path, 'w', encoding='utf-8') as f:\n    json.dump(existing,\
        \ f, indent=2)\nprint(f'Wrote {len(results)} SARIF result(s) to {sarif_path}')\n\
        PY_EOF\npython3 markdown-xss_annotations_to_sarif.py\n"
    - name: Ensure markdown-xss-results.sarif exists (fallback for 0 findings)
      if: always()
      run: "if [ ! -s markdown-xss-results.sarif ]; then\n  echo \"::notice::markdown-xss\
        \ found 0 findings. Generating empty SARIF to satisfy upload-sarif.\"\n  printf\
        \ '%s\\n' \\\n    '{' \\\n    '  \"version\": \"2.1.0\",' \\\n    '  \"$schema\"\
        : \"https://json.schemastore.org/sarif-2.1.0.json\",' \\\n    '  \"runs\"\
        : [' \\\n    '    {' \\\n    '      \"tool\": {' \\\n    '        \"driver\"\
        : {' \\\n    '          \"name\": \"markdown-xss\",' \\\n    '          \"\
        version\": \"0.65.0\",' \\\n    '          \"informationUri\": \"https://aquasecurity.github.io/trivy/\"\
        ' \\\n    '        }' \\\n    '      },' \\\n    '      \"results\": []' \\\
        \n    '    }' \\\n    '  ]' \\\n    '}' > markdown-xss-results.sarif\nfi\n\
        echo \"\u2713 markdown-xss-results.sarif size: $(stat -c%s markdown-xss-results.sarif)\
        \ bytes\"\n"
    - name: Upload markdown-xss SARIF to GitHub Code Scanning
      if: always()
      uses: github/codeql-action/upload-sarif@b1722c1245f90604c2c348f9d1624af97ea8fc6e
      with:
        sarif_file: markdown-xss-results.sarif
        category: markdown-xss
  jwt-auth-hardening:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
    - name: Checkout code
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
      with:
        persist-credentials: false
    - name: detect-jwt-misconfig-and-hardcoded-secret
      run: "set -euo pipefail\nexec > >(tee -a jwt-hardening.shell_log) 2>&1\nFAIL=0\n\
        \n# 1. Hardcoded JWT secret fallback (e.g. jwt.sign(payload, 'super-secret'))\n\
        if grep -RInE --include='*.js' \\\n  \"jwt\\.(sign|verify)\\s*\\([^)]*['\\\
        \"][A-Za-z0-9_\\-]{8,}['\\\"]\" \\\n  src/ 2>/dev/null; then\n  echo \"::error::Hardcoded\
        \ JWT secret string literal detected. Use process.env.JWT_SECRET only.\"\n\
        \  FAIL=1\nfi\n\n# 2. jwt.verify call WITHOUT an algorithms allowlist (alg-confusion\
        \ risk)\nUNGUARDED=$(grep -RInE --include='*.js' \\\n  'jwt\\.verify\\s*\\\
        ([^,]+,\\s*[^,)]+\\s*\\)' \\\n  src/ 2>/dev/null | grep -v 'algorithms' ||\
        \ true)\nif [ -n \"$UNGUARDED\" ]; then\n  echo \"::error::jwt.verify() called\
        \ without explicit { algorithms: [...] } allowlist:\"\n  echo \"$UNGUARDED\"\
        \n  FAIL=1\nfi\n\n# 3. jwt.sign without expiresIn \u2192 tokens never expire\n\
        NO_EXP=$(grep -RInE --include='*.js' \\\n  'jwt\\.sign\\s*\\(' \\\n  src/\
        \ 2>/dev/null | grep -v 'expiresIn' || true)\nif [ -n \"$NO_EXP\" ]; then\n\
        \  echo \"::warning::jwt.sign() called without expiresIn option (tokens will\
        \ never expire):\"\n  echo \"$NO_EXP\"\nfi\n\n[ \"$FAIL\" -eq 0 ] && echo\
        \ \"JWT auth configuration looks hardened.\" || exit 1\n"
    - name: semgrep-jwt-alg-confusion
      run: 'echo ''AI-designed Semgrep rule (id=ai-rule):''

        echo ''Rule body:''

        cat <<''SEMGREP_EOF'' | sed ''s/^/  /''


        SEMGREP_EOF

        '
    - name: Convert jwt-hardening shell_check annotations to SARIF
      if: always()
      run: "cat > jwt-hardening_annotations_to_sarif.py <<'PY_EOF'\nimport os, re,\
        \ json\nlog_path = 'jwt-hardening.shell_log'\nsarif_path = 'jwt-hardening-results.sarif'\n\
        tool_name = 'jwt-hardening'\ntool_version = '1.0.0'\ninformation_uri = 'https://github.com/iqbalrsyd/ai-devsecops'\n\
        rule_id_prefix = 'ai-devsecops-jwt-hardening'\nresults = []\nif os.path.exists(log_path):\n\
        \    pat = re.compile(r'^::(error|warning)(?: file=([^,]+))?(?:,line=(\\d+))?(?:,endLine=(\\\
        d+))?::(.*)$')\n    for idx, line in enumerate(open(log_path, encoding='utf-8',\
        \ errors='replace')):\n        m = pat.match(line.rstrip('\\n'))\n       \
        \ if not m:\n            continue\n        level, path, sl, el, msg = m.groups()\n\
        \        sl = int(sl) if sl else 1\n        el = int(el) if el else sl\n \
        \       if level == 'error':\n            sarif_level = 'error'\n        else:\n\
        \            sarif_level = 'warning'\n        msg = msg.strip()\n        slug\
        \ = re.sub(r'[^a-z0-9]+', '-', (msg or 'finding').lower())[:50].strip('-')\n\
        \        rule_id = f'{rule_id_prefix}-{slug}-{sl}-{idx}'\n        results.append({\n\
        \            'ruleId': rule_id,\n            'level': sarif_level,\n     \
        \       'message': {'text': msg or '(no message)'},\n            'locations':\
        \ [{\n                'physicalLocation': {\n                    'artifactLocation':\
        \ {'uri': path or 'unknown'},\n                    'region': {'startLine':\
        \ sl, 'endLine': el},\n                },\n            }],\n        })\nexisting\
        \ = {}\nif os.path.exists(sarif_path) and os.path.getsize(sarif_path) > 0:\n\
        \    try:\n        existing = json.load(open(sarif_path, encoding='utf-8'))\n\
        \    except Exception:\n        existing = {}\nif not existing or 'runs' not\
        \ in existing or not existing['runs']:\n    existing = {\n        'version':\
        \ '2.1.0',\n        '$schema': 'https://json.schemastore.org/sarif-2.1.0.json',\n\
        \        'runs': [{\n            'tool': {'driver': {\n                'name':\
        \ tool_name, 'version': tool_version, 'informationUri': information_uri,\n\
        \            }},\n            'results': [],\n        }],\n    }\nexisting['runs'][0]['tool']['driver']['name']\
        \ = tool_name\nexisting['runs'][0]['tool']['driver']['version'] = tool_version\n\
        existing['runs'][0]['tool']['driver']['informationUri'] = information_uri\n\
        existing['runs'][0]['results'] = (existing['runs'][0].get('results') or [])\
        \ + results\nwith open(sarif_path, 'w', encoding='utf-8') as f:\n    json.dump(existing,\
        \ f, indent=2)\nprint(f'Wrote {len(results)} SARIF result(s) to {sarif_path}')\n\
        PY_EOF\npython3 jwt-hardening_annotations_to_sarif.py\n"
    - name: Ensure jwt-hardening-results.sarif exists (fallback for 0 findings)
      if: always()
      run: "if [ ! -s jwt-hardening-results.sarif ]; then\n  echo \"::notice::jwt-hardening\
        \ found 0 findings. Generating empty SARIF to satisfy upload-sarif.\"\n  printf\
        \ '%s\\n' \\\n    '{' \\\n    '  \"version\": \"2.1.0\",' \\\n    '  \"$schema\"\
        : \"https://json.schemastore.org/sarif-2.1.0.json\",' \\\n    '  \"runs\"\
        : [' \\\n    '    {' \\\n    '      \"tool\": {' \\\n    '        \"driver\"\
        : {' \\\n    '          \"name\": \"jwt-hardening\",' \\\n    '          \"\
        version\": \"0.65.0\",' \\\n    '          \"informationUri\": \"https://aquasecurity.github.io/trivy/\"\
        ' \\\n    '        }' \\\n    '      },' \\\n    '      \"results\": []' \\\
        \n    '    }' \\\n    '  ]' \\\n    '}' > jwt-hardening-results.sarif\nfi\n\
        echo \"\u2713 jwt-hardening-results.sarif size: $(stat -c%s jwt-hardening-results.sarif)\
