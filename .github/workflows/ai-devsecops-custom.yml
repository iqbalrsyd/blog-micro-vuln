  blog-open-redirect-prevention:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
    - name: Checkout code
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
      with:
        persist-credentials: false
    - name: scan-open-redirect
      run: "set -e\nexec > >(tee -a blog-open-redirect.shell_log) 2>&1\nfail=0\n#\
        \ Look for direct res.redirect(req.query.*) without validation\nif grep -rnE\
        \ 'res\\.redirect\\s*\\(\\s*req\\.query\\.(next|returnTo|redirect|url)' src/\
        \ 2>/dev/null | grep -q .; then\n  echo '::error file=src/routes/auth.js::res.redirect\
        \ uses unvalidated user input \u2014 open-redirect phishing vector (CWE-601)'\n\
        \  fail=1\nfi\nexit $fail\n"
    - name: Convert blog-open-redirect shell_check annotations to SARIF
      if: always()
      run: "cat > blog-open-redirect_annotations_to_sarif.py <<'PY_EOF'\nimport os,\
        \ re, json\nlog_path = 'blog-open-redirect.shell_log'\nsarif_path = 'blog-open-redirect-results.sarif'\n\
        tool_name = 'blog-open-redirect'\ntool_version = '1.0.0'\ninformation_uri\
        \ = 'https://github.com/iqbalrsyd/ai-devsecops'\nrule_id_prefix = 'ai-devsecops-blog-open-redirect'\n\
        results = []\nif os.path.exists(log_path):\n    pat = re.compile(r'^::(error|warning)(?:\
        \ file=([^,]+))?(?:,line=(\\d+))?(?:,endLine=(\\d+))?::(.*)$')\n    for idx,\
        \ line in enumerate(open(log_path, encoding='utf-8', errors='replace')):\n\
        \        m = pat.match(line.rstrip('\\n'))\n        if not m:\n          \
        \  continue\n        level, path, sl, el, msg = m.groups()\n        sl = int(sl)\
        \ if sl else 1\n        el = int(el) if el else sl\n        if level == 'error':\n\
        \            sarif_level = 'error'\n        else:\n            sarif_level\
        \ = 'warning'\n        msg = msg.strip()\n        slug = re.sub(r'[^a-z0-9]+',\
        \ '-', (msg or 'finding').lower())[:50].strip('-')\n        rule_id = f'{rule_id_prefix}-{slug}-{sl}-{idx}'\n\
        \        results.append({\n            'ruleId': rule_id,\n            'level':\
        \ sarif_level,\n            'message': {'text': msg or '(no message)'},\n\
        \            'locations': [{\n                'physicalLocation': {\n    \
        \                'artifactLocation': {'uri': path or 'unknown'},\n       \
        \             'region': {'startLine': sl, 'endLine': el},\n              \
        \  },\n            }],\n        })\nexisting = {}\nif os.path.exists(sarif_path)\
        \ and os.path.getsize(sarif_path) > 0:\n    try:\n        existing = json.load(open(sarif_path,\
        \ encoding='utf-8'))\n    except Exception:\n        existing = {}\nif not\
        \ existing or 'runs' not in existing or not existing['runs']:\n    existing\
        \ = {\n        'version': '2.1.0',\n        '$schema': 'https://json.schemastore.org/sarif-2.1.0.json',\n\
        \        'runs': [{\n            'tool': {'driver': {\n                'name':\
        \ tool_name, 'version': tool_version, 'informationUri': information_uri,\n\
        \            }},\n            'results': [],\n        }],\n    }\nexisting['runs'][0]['tool']['driver']['name']\
        \ = tool_name\nexisting['runs'][0]['tool']['driver']['version'] = tool_version\n\
        existing['runs'][0]['tool']['driver']['informationUri'] = information_uri\n\
        existing['runs'][0]['results'] = (existing['runs'][0].get('results') or [])\
        \ + results\nwith open(sarif_path, 'w', encoding='utf-8') as f:\n    json.dump(existing,\
        \ f, indent=2)\nprint(f'Wrote {len(results)} SARIF result(s) to {sarif_path}')\n\
        PY_EOF\npython3 blog-open-redirect_annotations_to_sarif.py\n"
    - name: Ensure blog-open-redirect-results.sarif exists (fallback for 0 findings)
      if: always()
      run: "if [ ! -s blog-open-redirect-results.sarif ]; then\n  echo \"::notice::blog-open-redirect\
        \ found 0 findings. Generating empty SARIF to satisfy upload-sarif.\"\n  printf\
        \ '%s\\n' \\\n    '{' \\\n    '  \"version\": \"2.1.0\",' \\\n    '  \"$schema\"\
        : \"https://json.schemastore.org/sarif-2.1.0.json\",' \\\n    '  \"runs\"\
        : [' \\\n    '    {' \\\n    '      \"tool\": {' \\\n    '        \"driver\"\
        : {' \\\n    '          \"name\": \"blog-open-redirect\",' \\\n    '     \
        \     \"version\": \"0.65.0\",' \\\n    '          \"informationUri\": \"\
        https://aquasecurity.github.io/trivy/\"' \\\n    '        }' \\\n    '   \
        \   },' \\\n    '      \"results\": []' \\\n    '    }' \\\n    '  ]' \\\n\
        \    '}' > blog-open-redirect-results.sarif\nfi\necho \"\u2713 blog-open-redirect-results.sarif\
        \ size: $(stat -c%s blog-open-redirect-results.sarif) bytes\"\n"
    - name: Upload blog-open-redirect SARIF to GitHub Code Scanning
      if: always()
      uses: github/codeql-action/upload-sarif@b1722c1245f90604c2c348f9d1624af97ea8fc6e
      with:
        sarif_file: blog-open-redirect-results.sarif
        category: blog-open-redirect
