  jwt-auth-hardening:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
    - name: Checkout code
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
      with:
        persist-credentials: false
    - name: jwt-secret-and-expiry-check
      run: "set -e\nmkdir -p sarif-output\n# 1. Verify jwt is actually used\nJWT_USAGE=$(grep\
        \ -rEn \"jsonwebtoken|jwt\\.(sign|verify|decode)\" --include=\"*.js\" --exclude-dir=node_modules\
        \ . || true)\nif [ -z \"$JWT_USAGE\" ]; then\n  echo \"OK: jsonwebtoken not\
        \ used - skipping.\"\n  exit 0\nfi\necho \"$JWT_USAGE\"\nFAILED=0\n# 2. Detect\
        \ algorithm: 'none' anywhere\nif grep -rEn \"algorithm\\s*:\\s*['\\\"]none['\\\
        \"]|algorithms\\s*:\\s*\\[['\\\"]none['\\\"]\" --include=\"*.js\" --exclude-dir=node_modules\
        \ . ; then\n  echo \"::error title=JWT alg=none::algorithm: 'none' is forbidden\
        \ (CWE-347)\"\n  FAILED=1\nfi\n# 3. Detect jwt.sign calls missing expiresIn\
        \ (rough heuristic)\nif grep -rEn \"jwt\\.sign\\(\" --include=\"*.js\" --exclude-dir=node_modules\
        \ . | grep -v \"expiresIn\\|expires_in\" ; then\n  echo \"::warning title=JWT\
        \ missing expiresIn::jwt.sign() call without expiresIn - tokens never expire\"\
        \n  FAILED=1\nfi\n# 4. Detect hard-coded JWT secrets / fallbacks\nif grep\
        \ -rEn \"(JWT_SECRET|jwtSecret|jwt_secret)\\s*[:=]\\s*['\\\"][^'\\\"]+['\\\
        \"]\" --include=\"*.js\" --exclude-dir=node_modules . ; then\n  echo \"::error\
        \ title=Hardcoded JWT secret::JWT secret appears to be hard-coded - rotate\
        \ and source from env/secret manager\"\n  FAILED=1\nfi\n# 5. Detect jwt.verify\
        \ missing algorithms whitelist\nif grep -rEn \"jwt\\.verify\\(\" --include=\"\
        *.js\" --exclude-dir=node_modules . | grep -v \"algorithms\\s*:\" ; then\n\
        \  echo \"::warning title=JWT verify without algorithms::jwt.verify() should\
        \ pin algorithms: ['HS256'] (CWE-347 algorithm confusion)\"\n  FAILED=1\n\
        fi\nexit $FAILED\n"
